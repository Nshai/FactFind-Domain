          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfficeCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - OAuth2: [factfind]

    post:
      tags:
        - Reference Data
      summary: Add office
      description: |
        Creates a new office/branch record.

        Use when opening a new office location.
      operationId: createOffice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Office'
