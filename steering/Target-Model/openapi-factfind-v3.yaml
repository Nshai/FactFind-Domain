openapi: 3.1.0
info:
  title: FactFind API
  version: 3.0.0
  description: |
    # FactFind System API

    Comprehensive RESTful API for Wealth Management Platform

    ## Overview

    The FactFind API provides complete digital capabilities for financial advisory services including:
    - FactFind lifecycle management and aggregated views
    - Client onboarding, KYC, and identity verification
    - Employment, income, and expenditure tracking
    - Assets, liabilities, and net worth management
    - Investments, pensions, mortgages, and protection products
    - Financial goals and objectives
    - Attitude to Risk (ATR) assessment
    - Reference data and lookups

    ## Key Features

    - RESTful architecture with proper HTTP semantics
    - Single unified contract per entity
    - Hierarchical resource organization
    - Simple hypermedia with href navigation
    - Comprehensive validation and business rules
    - FCA, MiFID II, GDPR, and MLR 2017 compliant
    - Multi-tenancy support

    ## API Conventions

    ### Pagination
    - `$top` (integer, optional) - Number of items to return (default: 25, max: 100)
    - `$skip` (integer, optional) - Number of items to skip (default: 0)

    ### Ordering
    - `orderBy` (string, optional) - Field name followed by `asc` or `desc`
    - Example: `?orderBy=lastName asc,firstName asc`

    ### Filtering
    - `filter` (string, optional) - QueryLang filter expression
    - Syntax: `field operator value` with `and` to chain
    - Operators: `eq`, `ne`, `gt`, `ge`, `lt`, `le`, `in`, `startswith`
    - Example: `?filter=status eq 'Active' and age gt 30`

    ### Collection Response Structure
    All list endpoints return:
    ```json
    {
      "href": "current page URL",
      "first_href": "first page URL",
      "last_href": "last page URL",
      "next_href": "next page URL (null if on last page)",
      "prev_href": "previous page URL (null if on first page)",
      "items": [],
      "count": 123
    }
    ```

    ### Money Type
    All monetary values use simplified structure:
    ```json
    {
      "amount": 50000.00,
      "currency": {
        "code": "GBP"
      }
    }
    ```

