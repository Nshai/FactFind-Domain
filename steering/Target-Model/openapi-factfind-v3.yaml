              schema:
                $ref: '#/components/schemas/EstatePlanning'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

    put:
      tags:
        - Estate Planning
      summary: Update estate planning singleton
      description: |
        Creates or updates estate planning information.

        **Business Rules:**
        - Singleton resource (one per client)
        - First PUT creates record
        - Subsequent PUTs update all fields
        - gifts array is read-only (use gifts endpoints)

        **IHT Calculations:**
        - System calculates IHT based on estate value
        - Nil rate bands applied automatically
        - Residence nil rate band for main residence
      operationId: updateEstatePlanning
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstatePlanning'
            example:
              willInPlace: true
              willLastUpdated: '2020-06-15'
              executors:
                - name: Jane Smith
                  relationship: Spouse
              powerOfAttorney:
                propertyAndFinancial: true
                healthAndWelfare: false
                attorneys:
                  - name: Jane Smith
                    relationship: Spouse
              trustArrangements:
                hasTrusts: false
              ihtLiability:
                estimatedEstate:
                  amount: 850000.00
                  currency:
                    code: GBP
                nilRateBandAvailable:
                  amount: 325000.00
                  currency:
                    code: GBP
                residenceNilRateBand:
                  amount: 175000.00
                  currency:
                    code: GBP
      responses:
        '200':
          description: Estate planning updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstatePlanning'
        '201':
          description: Estate planning created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstatePlanning'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}/clients/{clientId}/estateplanning/gifts:
    post:
      tags:
        - Estate Planning
      summary: Create gift record
      description: |
        Records a gift made by the client (PET tracking).

        **IHT 7-Year Rule:**
        - Potentially Exempt Transfers (PETs) become fully exempt after 7 years
        - Taper relief applies if donor dies within 7 years
        - System calculates seven-year date and taper relief percentage

        **Exemptions:**
        - Annual exemption (£3,000)
        - Small gifts (£250 per person)
        - Wedding gifts (£5,000 for children, £2,500 for grandchildren, £1,000 for others)
        - Normal expenditure out of income
        - Gifts to charity or political parties

        **Business Rules:**
        - giftDate, recipient, giftValue required
        - sevenYearDate calculated automatically
        - taperRelief calculated based on years since gift
      operationId: createGift
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Gift'
            example:
              giftDate: '2023-12-25'
              recipient:
                name: Emma Smith
                relationship: Daughter
              giftValue:
                amount: 50000.00
                currency:
                  code: GBP
              giftType: Cash
              exemption:
                exemptionType: AnnualExemption
                exemptionAmount:
                  amount: 3000.00
                  currency:
                    code: GBP
              notes: Christmas gift for house deposit
      responses:
        '201':
          description: Gift created successfully
          headers:
            Location:
              schema:
                type: string
              description: URI of the created gift
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gift'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

