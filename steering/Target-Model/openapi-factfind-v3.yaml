        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  /factfinds/{id}/clients/{clientId}/vulnerabilities/{vulnerabilityId}:
    get:
      tags:
        - Vulnerability
      summary: Get a vulnerability
      description: |
        Retrieves a specific vulnerability record by ID.

        **Business Rules:**
        - Returns complete vulnerability details
        - Includes support actions and communication adjustments
        - Shows active status and resolution details if resolved

        **Use Cases:**
        - Display vulnerability details
        - Review support measures
        - Verify vulnerability status
        - Pre-populate edit form
      operationId: getVulnerability
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/VulnerabilityId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vulnerability'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    put:
      tags:
        - Vulnerability
      summary: Update a vulnerability
      description: |
        Updates an existing vulnerability record. Full replacement of resource.

        **Business Rules:**
        - Full update (all fields must be provided)
        - Can mark vulnerability as resolved by setting isActive to false
        - Must provide resolvedDate when marking as resolved
        - Support actions and communication adjustments can be updated
        - Read-only fields (id, href, timestamps) ignored

        **FCA Consumer Duty:**
        - Document changes in vulnerability status
        - Update support actions as needed
        - Record resolution of vulnerability
        - Maintain audit trail

        **Validation:**
        - Same validation rules as POST
        - If isActive = false, resolvedDate required
        - updatedAt timestamp automatically set

        **Use Cases:**
        - Update support actions
        - Mark vulnerability as resolved
        - Update communication adjustments
        - Add notes on ongoing monitoring
      operationId: updateVulnerability
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/VulnerabilityId'
      requestBody:
        required: true
        content:
