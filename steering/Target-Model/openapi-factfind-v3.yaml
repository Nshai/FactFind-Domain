        - OAuth2: [factfind]

  /reference/advisers/{adviserId}:
    get:
      tags:
        - Reference Data
      summary: Get adviser details
      description: Retrieves detailed information for a specific adviser.
      operationId: getAdviser
      parameters:
        - $ref: '#/components/parameters/AdviserId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Adviser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    patch:
      tags:
        - Reference Data
      summary: Update adviser
      description: |
        Updates adviser details. Supports partial updates.

        Common updates:
        - Contact information
        - Office assignment
        - Qualifications
        - Active status
      operationId: updateAdviser
      parameters:
        - $ref: '#/components/parameters/AdviserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Adviser'
      responses:
        '200':
          description: Adviser updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Adviser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    delete:
      tags:
        - Reference Data
      summary: Delete adviser
      description: |
        Removes an adviser from the reference data.

        Note: Typically advisers are marked inactive rather than deleted to preserve audit trail.
      operationId: deleteAdviser
      parameters:
        - $ref: '#/components/parameters/AdviserId'
      responses:
        '204':
