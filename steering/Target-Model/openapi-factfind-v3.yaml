  # ============================================================================
  # ATR ASSESSMENT API (3 operations)
  # ============================================================================

  /factfinds/{id}/atr-assessments:
    get:
      tags:
        - ATR Assessment
      summary: List ATR assessments for a FactFind
      description: |
        Retrieves all Attitude to Risk assessments with historical data.

        **ATR Ratings:**
        - **VERY_CAUTIOUS (1-2):** Capital preservation, minimal volatility, cash/short bonds
        - **CAUTIOUS (3-4):** Low volatility, 20-40% equities, defensive assets
        - **BALANCED (5-6):** Moderate volatility, 40-60% equities, balanced growth/income
        - **ADVENTUROUS (7-8):** High volatility, 60-80% equities, growth focused
        - **VERY_ADVENTUROUS (9-10):** Very high volatility, 80-100% equities, maximum growth

        **FCA Requirements (COBS 9.2):**
        - Mandatory for investment advice
        - Must assess attitude to risk AND capacity for loss
        - Review annually or on material change in circumstances
        - Consider knowledge, experience, financial situation
        - Document assessment methodology

        **Assessment Components:**
        1. **Attitude to Risk:** Psychological willingness to accept volatility
        2. **Capacity for Loss:** Financial ability to absorb losses without lifestyle impact
        3. **Investment Experience:** Knowledge of investment types and behavior
        4. **Time Horizon:** When funds will be needed (longer = more risk acceptable)

        **Validity:**
        - Typically valid for 12 months
        - Review triggered by: retirement, inheritance, redundancy, illness, house sale
        - Material changes in circumstances require new assessment
      operationId: listATRAssessments
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/OrderBy'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ATRAssessmentCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    post:
      tags:
        - ATR Assessment
      summary: Create ATR assessment
      description: |
        Creates a new Attitude to Risk assessment.

        **Assessment Process:**
        1. Complete risk questionnaire (10-30 questions typically)
        2. Assess capacity for loss separately
        3. Review investment experience
        4. Consider time horizon
        5. Calculate overall risk score and rating
        6. Explain rating to client
        7. Client sign-off

        **Capacity for Loss Assessment:**
        - **LOW:** Limited emergency fund, income covers essentials only, near retirement
        - **MEDIUM:** 3-6 months emergency fund, can absorb moderate losses, mid-career
        - **HIGH:** Significant liquid assets, losses won't impact lifestyle, long time horizon

        **Risk/Return Trade-off:**
        - Very Cautious: 0-2% expected return, minimal volatility
        - Cautious: 2-4% expected return, low volatility
        - Balanced: 4-6% expected return, moderate volatility
        - Adventurous: 6-8% expected return, high volatility
        - Very Adventurous: 8%+ expected return, very high volatility

        **Important:**
        - Final portfolio must match both ATR AND capacity for loss (use lower)
        - Experience affects suitability of complex products
        - Time horizon constrains risk (short-term = lower risk appropriate)
      operationId: createATRAssessment
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ATRAssessment'
      responses:
        '201':
          description: ATR assessment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ATRAssessment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  /factfinds/{id}/atr-assessments/{assessmentId}:
    get:
      tags:
        - ATR Assessment
      summary: Get ATR assessment details
      description: |
        Retrieves detailed information for a specific ATR assessment.

        **Assessment Details Include:**
        - Overall risk rating and score
        - Capacity for loss assessment
        - Investment experience details
        - Time horizon information
        - Volatility tolerance
        - Full questionnaire responses
        - Validity dates
        - Historical comparison

        **Using ATR Results:**
        - Match investment portfolio to risk rating
        - Consider capacity for loss as constraint (cannot exceed)
        - Tailor product selection to experience level
        - Align time horizon with product terms
        - Document suitability of recommendations
        - Review regularly and on life changes
      operationId: getATRAssessment
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ATRAssessmentId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ATRAssessment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

