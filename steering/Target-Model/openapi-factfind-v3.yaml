        - OEIC
        - UNIT_TRUST
        - INVESTMENT_BOND
        - OFFSHORE_BOND
      description: Type of investment product

    TaxWrapperTypeEnum:
      type: string
      enum:
        - ISA
        - GIA
        - OFFSHORE_BOND
        - ONSHORE_BOND
      description: Tax wrapper type for investment

    ISATypeEnum:
      type: string
      enum:
        - STOCKS_SHARES
        - CASH
        - LIFETIME
        - JUNIOR
      description: Type of ISA

    AdviceTypeEnum:
      type: string
      enum:
        - ONGOING
        - ONE_OFF
        - EXECUTION_ONLY
