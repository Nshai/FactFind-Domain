          example: '2026-01-15'

    TerritorialProfile:
      type: object
      description: Residency, domicile, citizenship, and territorial tax status
      properties:
        countryOfResidence:
          type: object
          description: Current country of residence with ISO code
          properties:
            code:
              type: string
              pattern: '^[A-Z]{2}$'
              example: GB
            alpha3:
              type: string
              pattern: '^[A-Z]{3}$'
              example: GBR
            display:
              type: string
              example: United Kingdom
        countryOfDomicile:
          type: object
          description: Country of domicile for tax purposes
          properties:
            code:
              type: string
              pattern: '^[A-Z]{2}$'
              example: GB
            alpha3:
              type: string
              pattern: '^[A-Z]{3}$'
              example: GBR
            display:
              type: string
              example: United Kingdom
        countryOfBirth:
          type: object
          description: Country where the client was born
          properties:
            code:
              type: string
              pattern: '^[A-Z]{2}$'
              example: GB
            alpha3:
              type: string
              pattern: '^[A-Z]{3}$'
              example: GBR
            display:
              type: string
              example: United Kingdom
        countryOfOrigin:
          type: object
          description: Country of origin
          properties:
            code:
              type: string
              pattern: '^[A-Z]{2}$'
              example: GB
            alpha3:
              type: string
              pattern: '^[A-Z]{3}$'
              example: GBR
            display:
              type: string
              example: United Kingdom
        placeOfBirth:
          type: string
          maxLength: 100
          description: City/town where the client was born
          example: London
        countriesOfCitizenship:
          type: array
          description: List of countries where client holds citizenship
          items:
            type: object
            properties:
              code:
                type: string
                pattern: '^[A-Z]{2}$'
              alpha3:
                type: string
                pattern: '^[A-Z]{3}$'
              display:
                type: string
        ukResident:
          type: boolean
          description: Whether the client is UK tax resident
          example: true
        ukDomicile:
          type: boolean
          description: Whether the client is UK domiciled
          example: true
        expatriate:
          type: boolean
          description: Whether the client is an expatriate
          example: false

    ClientCollection:
      allOf:
