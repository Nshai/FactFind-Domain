  # ============================================================================
  /factfinds/{id}/liabilities:
    get:
      tags:
        - Liability
      summary: List liabilities for a FactFind
      description: |
        Retrieves all debt obligations for a FactFind including mortgages, loans, credit cards, and other liabilities.

        **Business Rules:**
        - Returns all liabilities across all clients in the FactFind
        - Supports pagination via $top and $skip parameters
        - Can be filtered by liabilityCategory, protected, consolidate
        - Can be sorted using orderBy parameter

        **Liability Categories:**
        - MAIN_RESIDENCE: Primary residence mortgage
        - BUY_TO_LET: Buy-to-let mortgage
        - SECOND_HOME: Second home/holiday home mortgage
        - PERSONAL_LOAN: Unsecured personal loan
        - CREDIT_CARD: Revolving credit card debt
        - HP_LEASE: Hire purchase or lease agreement
        - STUDENT_LOAN: Student loan debt
        - MAINTENANCE: Maintenance or alimony payments
        - OTHER: Other liability types

        **Use Cases:**
        - Display complete debt portfolio
        - Calculate total liabilities
        - Assess debt consolidation opportunities
        - Review protection coverage
        - Identify secured vs unsecured debt
      operationId: listLiabilities
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiabilityCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    post:
      tags:
        - Liability
      summary: Add a liability
      description: |
        Creates a new liability/debt record.

        **Business Rules:**
        - owner, liabilityCategory, lender, amounts, and repayment details required
        - amountOutstanding must be <= originalLoanAmount
        - For CREDIT_CARD category, creditLimit is required
        - Protection coverage tracking (Life, CIC, Life+CIC, or Not Protected)
        - Can link to secured asset (property, car, etc.)

        **Protection Types:**
        - NOT_PROTECTED: No insurance cover
        - LIFE: Life insurance only
        - CIC: Critical illness cover only
        - LIFE_AND_CIC: Full protection

        **Rate Types:**
        - FIXED: Fixed rate for specified period
        - VARIABLE: Variable rate
        - TRACKER: Follows base rate

        **Repayment Methods:**
        - REPAYMENT: Capital and interest
        - INTEREST_ONLY: Interest only
        - PART_AND_PART: Part repayment, part interest-only

        **FCA Requirements:**
        - Mortgage affordability assessment
        - Protection needs analysis
        - Debt consolidation suitability

        **Validation:**
        - interestRate typically 0.5% - 30%
        - loanTermYears typically 1-40 years
        - endDate must be after startDate if provided

        **Use Cases:**
        - Record primary residence mortgage
        - Add personal loan details
        - Track credit card debt
        - Document buy-to-let mortgages
      operationId: createLiability
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Liability'
            example:
              owner:
                client:
                  id: 8496
                  name: John Smith
              description: Primary Residence Mortgage - 123 Main Street, London
              liabilityCategory: MAIN_RESIDENCE
              lender: Nationwide Building Society
              liabilityAccountNumber: MTG-123456
              originalLoanAmount:
                amount: 250000.00
                currency:
                  code: GBP
              amountOutstanding:
                amount: 180000.00
                currency:
                  code: GBP
              interestRate: 3.5
              rateType: FIXED
              repaymentOrInterestOnly: REPAYMENT
              paymentAmount:
                amount: 1200.00
                currency:
                  code: GBP
              loanTermYears: 25
              startDate: '2015-06-01'
              endDate: '2040-06-01'
              earlyRedemptionCharge:
                amount: 5000.00
                currency:
                  code: GBP
              protected: LIFE_AND_CIC
              linkedAssetRef:
                id: 1234
              protectionArrangementRef:
                id: 555
              isToBeRepaid: false
              consolidate: false
              isGuarantorMortgage: false
      responses:
        '201':
          description: Liability created successfully
          headers:
            Location:
              description: URI of the created liability
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Liability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

