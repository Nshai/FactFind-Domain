  # ============================================================================
  # OBJECTIVES API (5 operations)
  # ============================================================================

  /factfinds/{id}/objectives:
    get:
      tags:
        - Objectives
      summary: List financial objectives for a FactFind
      description: |
        Retrieves all financial objectives and goals.

        **Objective Categories:**
        - **RETIREMENT:** Retirement planning, pension accumulation, retirement income
        - **INVESTMENT:** Wealth accumulation, investment growth, portfolio building
        - **PROTECTION:** Protection needs, insurance planning, family security
        - **MORTGAGE:** Home purchase, mortgage planning, property ownership
        - **EDUCATION:** Education funding for children, university costs
        - **ESTATE_PLANNING:** Inheritance planning, IHT mitigation, legacy
        - **TAX_PLANNING:** Tax efficiency, allowance utilization, mitigation
        - **INCOME:** Income generation, cash flow planning, dividend income
        - **DEBT_REDUCTION:** Debt consolidation, debt-free goals, liability reduction
        - **EMERGENCY_FUND:** Emergency savings buffer (3-6 months expenses)
        - **OTHER:** Other specific goals

        **SMART Objectives:**
        - **Specific:** Clearly defined goal
        - **Measurable:** Quantifiable target amount
        - **Achievable:** Realistic given circumstances
        - **Relevant:** Aligned with client values
        - **Time-bound:** Target date specified

        **Prioritization:**
        - **CRITICAL:** Must achieve (debt repayment, essential protection)
        - **HIGH:** Important goals (retirement, children's education)
        - **MEDIUM:** Desirable goals (home improvements, holiday fund)
        - **LOW:** Nice to have (luxury purchases, wants vs needs)
      operationId: listObjectives
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/OrderBy'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectiveCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    post:
      tags:
        - Objectives
      summary: Add a financial objective
      description: |
        Creates a new financial objective.

        **Common Objectives Examples:**
        - Retire at age 65 with £40,000 annual income
        - University education fund £100,000 in 10 years
        - Emergency fund £15,000 in 2 years (3 months expenses)
        - Mortgage-free by age 55
        - Generate £500/month additional income
        - Estate planning: IHT below nil rate band
        - Debt-free within 3 years
        - Holiday home deposit £50,000 in 5 years

        **Resource Allocation:**
        - Link existing products contributing to objective
        - Identify gaps between current and target
        - Calculate required monthly savings
        - Assign appropriate risk profile for time horizon

        **Time Horizons:**
        - **SHORT_TERM:** 0-5 years (lower risk, capital preservation)
        - **MEDIUM_TERM:** 5-10 years (balanced risk, moderate growth)
        - **LONG_TERM:** 10+ years (higher risk acceptable, growth focused)
      operationId: createObjective
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Objective'
      responses:
        '201':
          description: Objective created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Objective'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
