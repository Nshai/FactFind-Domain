components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: |
        OAuth 2.0 authorization with single unified scope.

        The API uses a single `factfind` scope for all operations.
        Fine-grained permissions are managed at the application/tenant level.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.factfind.com/oauth/authorize
          tokenUrl: https://auth.factfind.com/oauth/token
          scopes:
            factfind: Full access to all FactFind API operations
        clientCredentials:
          tokenUrl: https://auth.factfind.com/oauth/token
          scopes:
            factfind: Full access to all FactFind API operations

  parameters:
    # Path Parameters
    FactFindId:
      name: id
      in: path
      required: true
      description: FactFind identifier
      schema:
        type: integer
        format: int64
        example: 679

    ClientId:
      name: clientId
      in: path
      required: true
      description: Client identifier
      schema:
        type: integer
        format: int64
        example: 8496

    AddressId:
      name: addressId
      in: path
      required: true
      description: Address identifier
      schema:
        type: integer
        format: int64

    ContactId:
      name: contactId
      in: path
      required: true
      description: Contact identifier
      schema:
        type: integer
        format: int64

    RelationshipId:
      name: relationshipId
      in: path
      required: true
      description: Relationship identifier
      schema:
        type: integer
        format: int64

    DependantId:
      name: dependantId
      in: path
      required: true
      description: Dependant identifier
      schema:
        type: integer
        format: int64

    VulnerabilityId:
      name: vulnerabilityId
      in: path
      required: true
      description: Vulnerability identifier
      schema:
        type: integer
        format: int64

    GiftId:
      name: giftId
      in: path
      required: true
      description: Gift identifier
      schema:
        type: integer
        format: int64

    AgreementId:
      name: agreementId
      in: path
      required: true
      description: DPA Agreement identifier (use 'current' for latest)
      schema:
        oneOf:
          - type: integer
            format: int64
          - type: string
            enum: [current]
        example: current

    EmploymentId:
      name: employmentId
      in: path
      required: true
      description: Employment identifier
      schema:
        type: integer
        format: int64

    IncomeId:
      name: incomeId
      in: path
      required: true
      description: Income identifier
      schema:
        type: integer
        format: int64

    ExpenditureId:
      name: expenditureId
      in: path
      required: true
      description: Expenditure identifier
      schema:
        type: integer
        format: int64

    ChangeId:
      name: changeId
      in: path
      required: true
      description: Change record identifier
      schema:
        type: integer
        format: int64

    AssetId:
      name: assetId
      in: path
      required: true
      description: Asset identifier
      schema:
        type: integer
        format: int64

    LiabilityId:
      name: liabilityId
      in: path
      required: true
      description: Liability identifier
      schema:
        type: integer
        format: int64

    ObjectiveId:
      name: objectiveId
      in: path
      required: true
      description: Objective identifier
      schema:
        type: integer
        format: int64

    EventId:
      name: eventId
      in: path
      required: true
      description: Credit history event identifier
      schema:
        type: integer
        format: int64

    MortgageId:
      name: mortgageId
      in: path
      required: true
      description: Unique identifier of the mortgage
      schema:
        type: integer
        format: int64

    ProtectionId:
      name: protectionId
      in: path
      required: true
      description: Unique identifier of the protection policy
      schema:
        type: integer
        format: int64

    ATRAssessmentId:
      name: assessmentId
      in: path
      required: true
      description: Unique identifier of the ATR assessment
      schema:
        type: integer
        format: int64

    ProviderId:
      name: providerId
      in: path
      required: true
      description: Unique identifier of the provider
      schema:
        type: integer
        format: int64

    AdviserId:
      name: adviserId
      in: path
      required: true
      description: Unique identifier of the adviser
      schema:
        type: integer
        format: int64

    OfficeId:
      name: officeId
      in: path
      required: true
      description: Unique identifier of the office
      schema:
        type: integer
        format: int64

    SnapshotId:
      name: snapshotId
      in: path
      required: true
      description: Net worth snapshot identifier
      schema:
        type: integer
        format: int64

    AccountId:
      name: accountId
      in: path
      required: true
      description: Bank account identifier
      schema:
        type: integer
        format: int64

    # Query Parameters
    TaxYear:
      name: taxYear
      in: query
      required: false
      description: Tax year in format YYYY/YY (defaults to current tax year)
      schema:
        type: string
        pattern: '^\d{4}/\d{2}$'
        example: "2024/25"

    # Pagination and Filtering Parameters
    Top:
      name: $top
      in: query
      description: Number of items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      example: 25

    Skip:
      name: $skip
      in: query
      description: Number of items to skip
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0

    OrderBy:
      name: orderBy
      in: query
      description: |
        Ordering specification. Format: `fieldName asc|desc`

        Multiple fields can be specified comma-separated.

        Examples:
        - `lastName asc`
        - `lastName asc,firstName asc`
        - `createdAt desc`
      schema:
        type: string
      example: lastName asc

    Filter:
      name: filter
      in: query
      description: |
        QueryLang filter expression.

        Syntax: `field operator value` with `and` to chain conditions.

        Operators:
        - `eq` - equals
        - `ne` - not equals
        - `gt` - greater than
        - `ge` - greater than or equal
        - `lt` - less than
        - `le` - less than or equal
        - `in` - in list
        - `startswith` - starts with

        Examples:
        - `status eq 'Active'`
        - `age gt 30 and status eq 'Active'`
        - `clients.id eq 123`
      schema:
        type: string
      example: status eq 'Active'

  responses:
    # Success Responses
    NoContent:
      description: Operation successful, no content returned

    # Error Responses
    BadRequest:
      description: Bad Request - Invalid data or validation failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationError:
              summary: Validation error example
              value:
                error:
                  code: VALIDATION_ERROR
                  message: Request validation failed
                  details:
                    - field: clients
                      issue: At least one client is required
                      value: []
            invalidEnum:
              summary: Invalid enum value
              value:
                error:
                  code: INVALID_ENUM_VALUE
                  message: Invalid meeting type value
                  details:
                    - field: meeting.meetingType
                      issue: Value must be one of Electronic, Videocall, FaceToFace, Telephone
                      value: Zoom

    Unauthorized:
      description: Unauthorized - Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication token is missing or invalid

    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FORBIDDEN
              message: Insufficient permissions to access this resource

    NotFound:
      description: Not Found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found

    Conflict:
      description: Conflict - Concurrent modification detected
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: CONFLICT
              message: Resource has been modified by another user

  schemas:
    # Common Value Types
    MoneyValue:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: double
          description: Monetary amount with up to 2 decimal places
          example: 50000.00
        currency:
          $ref: '#/components/schemas/CurrencyCode'

    CurrencyCode:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: ISO 4217 three-letter currency code
          pattern: '^[A-Z]{3}$'
          example: GBP

    Address:
      type: object
      required:
        - line1
        - city
        - postcode
        - country
      properties:
        line1:
          type: string
          maxLength: 100
          description: Address line 1
          example: 123 High Street
        line2:
          type: string
          maxLength: 100
          description: Address line 2 (optional)
          example: Apartment 4B
        city:
          type: string
          maxLength: 50
          description: City or town
          example: London
        county:
          type: string
          maxLength: 50
          description: County or region
          example: Greater London
        postcode:
          type: string
          maxLength: 20
          description: Postal code
          example: SW1A 1AA
        country:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2 country code
          example: GB

    ReferenceLink:
      type: object
      required:
        - id
        - href
      properties:
        id:
          type: integer
          format: int64
          description: Resource identifier
          example: 123
        href:
          type: string
          format: uri
          description: Link to resource
          example: /api/v3/factfinds/679/clients/123
        name:
          type: string
          description: Display name (read-only, populated by system)
          readOnly: true
          example: John Smith

    ClientReference:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
          description: Client identifier
          example: 123
        href:
          type: string
          format: uri
          description: Link to client resource (read-only)
          readOnly: true
          example: /api/v3/factfinds/679/clients/123
        name:
          type: string
          description: Client name (read-only, populated from Client API)
          readOnly: true
          example: John Smith

    # Collection Response
    CollectionResponse:
      type: object
      required:
        - href
        - first_href
        - last_href
        - items
        - count
      properties:
        href:
          type: string
          format: uri
          description: Current page URL
          example: /api/v3/factfinds?$top=25&$skip=0
        first_href:
          type: string
          format: uri
          description: First page URL
          example: /api/v3/factfinds?$top=25&$skip=0
        last_href:
          type: string
          format: uri
          description: Last page URL
          example: /api/v3/factfinds?$top=25&$skip=125
        next_href:
          type: string
          nullable: true
          format: uri
          description: Next page URL (null if on last page)
          example: /api/v3/factfinds?$top=25&$skip=25
        prev_href:
          type: string
          nullable: true
          format: uri
          description: Previous page URL (null if on first page)
          example: null
        items:
          type: array
          description: Array of resources
        count:
          type: integer
          description: Total count across all pages
          example: 150

    # Error Response
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Error code for programmatic handling
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error message
              example: Request validation failed
            details:
              type: array
              description: Detailed error information
              items:
                type: object
                properties:
                  field:
                    type: string
                    description: Field name that caused the error
                    example: clients
                  issue:
                    type: string
                    description: Description of the issue
                    example: At least one client is required
                  value:
                    description: Value that caused the error
                    example: []

    # Enumerations
    GenderEnum:
      type: string
      enum:
        - Male
        - Female
        - Other
        - PreferNotToSay

    TitleEnum:
      type: string
      enum:
        - Mr
        - Mrs
        - Miss
        - Ms
        - Dr
        - Prof
        - Rev
        - Sir
        - Dame
        - Lord
        - Lady

    MaritalStatusEnum:
      type: string
      enum:
        - Single
        - Married
        - CivilPartnership
        - Divorced
        - Widowed
        - Separated
        - Cohabiting

    MeetingTypeEnum:
      type: string
      enum:
        - Electronic
        - ElectronicRecorded
        - Videocall
        - VideocallRecorded
        - FaceToFace
        - FaceToFaceRecorded
        - Telephone
        - TelephoneRecorded
      description: |
        Meeting types:
        - Electronic - Email, online form
        - ElectronicRecorded - Electronic with recording
        - Videocall - Video call meeting
        - VideocallRecorded - Video call with recording
        - FaceToFace - In-person meeting
        - FaceToFaceRecorded - In-person with recording
        - Telephone - Phone call
        - TelephoneRecorded - Phone call with recording (client consent required)

    DisclosureTypeEnum:
      type: string
      enum:
        - CombinedDisclosureDocuments
        - CombinedInitialDisclosureDocument
        - DisclosureDocument
        - KeyfactsAboutCostOfServices
        - KeyfactsAboutServices
        - ServiceCostDisclosureDocument
        - TermsRefundOfFees
        - TermsOfBusiness

    NonReductionReasonEnum:
      type: string
      enum:
        - RetainControlOfCapital
        - PensionPlanning
        - Other
      description: |
        Reasons for not reducing liabilities:
        - RetainControlOfCapital - Prefer liquidity and flexibility
        - PensionPlanning - Using liabilities as part of pension strategy
        - Other - Other reason (explain in details field)

    # Main Domain Schemas
    FactFind:
      type: object
      required:
        - id
        - href
        - clients
      properties:
        id:
          type: integer
          format: int64
          description: Unique system identifier
          readOnly: true
          example: 679
        href:
          type: string
          format: uri
          description: API resource link
          readOnly: true
          example: /api/v3/factfinds/679
        clients:
          type: array
          description: Array of associated clients (id required, name read-only)
          minItems: 1
          items:
            $ref: '#/components/schemas/ClientReference'
        meeting:
          $ref: '#/components/schemas/Meeting'
        disclosureKeyfacts:
          type: array
          description: Array of issued disclosure documents
          items:
            $ref: '#/components/schemas/DisclosureKeyfact'

    Meeting:
      type: object
      properties:
        meetingOn:
          type: string
          format: date
          description: Date meeting occurred (ISO 8601 YYYY-MM-DD)
          example: '2026-03-05'
        meetingType:
          $ref: '#/components/schemas/MeetingTypeEnum'
        clientsPresent:
          type: array
          description: Clients present at meeting
          items:
            $ref: '#/components/schemas/ClientReference'
        anyOtherAudience:
          type: boolean
          description: Whether other audience present (interpreter, family, etc.)
          example: false
        notes:
          type: string
          maxLength: 5000
          description: Meeting notes
          example: Initial consultation to discuss retirement planning.

    DisclosureKeyfact:
      type: object
      required:
        - Type
        - IssuedOn
      properties:
        Type:
          $ref: '#/components/schemas/DisclosureTypeEnum'
        IssuedOn:
          type: string
          format: date
          description: Date document issued to client (ISO 8601 YYYY-MM-DD)
          example: '2026-03-05'

    FactFindCollection:
      allOf:
        - $ref: '#/components/schemas/CollectionResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/FactFind'

    # Control Options Schemas
    ControlOptions:
      type: object
      required:
        - href
        - factfind
      properties:
        href:
          type: string
          format: uri
          description: API resource link
          readOnly: true
          example: /api/v3/factfinds/679/controloptions
        factfind:
          type: object
          description: FactFind reference (read-only)
          readOnly: true
          required:
            - id
            - href
          properties:
            id:
              type: integer
              format: int64
              example: 679
            href:
              type: string
              format: uri
              example: /api/v3/factfinds/679
        investments:
          $ref: '#/components/schemas/InvestmentsControl'
        pensions:
          $ref: '#/components/schemas/PensionsControl'
        mortgages:
          $ref: '#/components/schemas/MortgagesControl'
        protections:
          $ref: '#/components/schemas/ProtectionsControl'
        assets:
          $ref: '#/components/schemas/AssetsControl'
        liabilities:
          $ref: '#/components/schemas/LiabilitiesControl'

    InvestmentsControl:
      type: object
      properties:
        hasCash:
          type: boolean
          nullable: true
          description: Has cash savings or bank accounts
          example: true
        hasInvestments:
          type: boolean
          nullable: true
          description: Has investment products (ISAs, bonds, stocks, funds)
          example: true

    PensionsControl:
      type: object
      properties:
        hasEmployerPensionSchemes:
          type: boolean
          nullable: true
          description: Has employer pension schemes
          example: true
        hasFinalSalary:
          type: boolean
          nullable: true
          description: Has final salary (defined benefit) pensions
          example: false
        hasMoneyPurchases:
          type: boolean
          nullable: true
          description: Has money purchase (defined contribution) pensions
          example: true
        hasPersonalPensions:
          type: boolean
          nullable: true
          description: Has personal pensions (SIPPs, stakeholder)
          example: true
        hasAnnuities:
          type: boolean
          nullable: true
          description: Has annuity products
          example: false

    MortgagesControl:
      type: object
      properties:
        hasMortgages:
          type: boolean
          nullable: true
          description: Has residential mortgages
          example: true
        hasEquityRelease:
          type: boolean
          nullable: true
          description: Has equity release products (lifetime mortgage, home reversion)
          example: false

    ProtectionsControl:
      type: object
      properties:
        hasProtection:
          type: boolean
          nullable: true
          description: Has protection products (life, critical illness, income protection)
          example: true

    AssetsControl:
      type: object
      properties:
        hasAssets:
          type: boolean
          nullable: true
          description: Has assets (property, investments, cash)
          example: true

  # ============================================================================
  # REFERENCE DATA API SCHEMAS
  # ============================================================================

  # Enumerations for Reference Data Categories
    ReferenceDataCategoryEnum:
      type: string
      enum:
        - PERSONAL
        - EMPLOYMENT
        - FINANCIAL
        - PRODUCT
        - LOCATION
        - ADVISER
      description: |
        Category of reference data.
        - PERSONAL: Personal data lookups (genders, titles, marital statuses)
        - EMPLOYMENT: Employment-related lookups (statuses, occupation codes)
        - FINANCIAL: Financial lookups (income types, expenditure categories, frequencies)
        - PRODUCT: Product-related lookups (investment types, pension types, protection types)
        - LOCATION: Geographic lookups (countries, currencies, regions)
        - ADVISER: Adviser and firm data
  
    # Value Types
    EnumerationValue:
      type: object
      required:
        - code
        - display
      properties:
        code:
          type: string
          maxLength: 50
          description: Unique code for this enumeration value
          example: "M"
        display:
          type: string
          maxLength: 200
          description: Display text for this value
          example: "Male"
        description:
          type: string
          maxLength: 500
          description: Detailed description of this value
        sortOrder:
          type: integer
          description: Sort order for display purposes
        isActive:
          type: boolean
          description: Whether this value is currently active/available
          default: true
      description: Represents a single enumeration value in a lookup list
  
    Country:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2 country code
          example: "GB"
        name:
          type: string
          maxLength: 200
          description: Country name
          example: "United Kingdom"
        alpha3:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 3166-1 alpha-3 country code
          example: "GBR"
        numericCode:
          type: string
          pattern: '^\d{3}$'
          description: ISO 3166-1 numeric country code
          example: "826"
        region:
          type: string
          maxLength: 100
          description: Geographic region
          example: "Europe"
        isEU:
          type: boolean
          description: Whether country is in the European Union
        isActive:
          type: boolean
          description: Whether country is active for selection
          default: true
      description: Country reference data
  
    Currency:
      type: object
      required:
        - code
        - name
        - symbol
      properties:
        code:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 three-letter currency code
          example: "GBP"
        name:
          type: string
          maxLength: 200
          description: Currency name
          example: "British Pound Sterling"
        symbol:
          type: string
          maxLength: 10
          description: Currency symbol
          example: "£"
        minorUnit:
          type: integer
          minimum: 0
          maximum: 4
          description: Number of decimal places (e.g., 2 for pence/cents)
          example: 2
        countries:
          type: array
          items:
            type: string
          description: Country codes using this currency
          example: ["GB", "IM", "JE", "GG"]
        isActive:
          type: boolean
          description: Whether currency is active for selection
          default: true
      description: Currency reference data
  
    Frequency:
      type: object
      required:
        - code
        - display
        - periodsPerYear
      properties:
        code:
          type: string
          maxLength: 10
          description: Frequency code
          example: "M"
        display:
          type: string
          maxLength: 100
          description: Display name
          example: "Monthly"
        periodsPerYear:
          type: integer
          minimum: 0
          description: Number of periods per year (0 for one-off)
          example: 12
        sortOrder:
          type: integer
          description: Sort order for display
        isActive:
          type: boolean
          default: true
      description: |
        Payment/contribution frequency reference data.
  
        **Standard Frequencies:**
        - ONE_OFF: One-off payment (0 periods/year)
        - WEEKLY: Weekly (52 periods/year)
        - FORTNIGHTLY: Fortnightly (26 periods/year)
        - FOUR_WEEKLY: Four-weekly (13 periods/year)
        - MONTHLY: Monthly (12 periods/year)
        - QUARTERLY: Quarterly (4 periods/year)
        - HALF_YEARLY: Half-yearly (2 periods/year)
        - ANNUALLY: Annually (1 period/year)

    FrequencyValue:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          maxLength: 10
          description: Frequency code
          example: "M"
      description: Simplified frequency value reference

    TaxBand:
      type: object
      required:
        - taxYear
        - country
        - band
        - lowerLimit
        - rate
      properties:
        taxYear:
          type: string
          pattern: '^\d{4}/\d{2}$'
          description: Tax year
          example: "2024/25"
        country:
          type: string
          pattern: '^[A-Z]{2}$'
          description: Country code
          example: "GB"
        band:
          type: string
          maxLength: 50
          description: Band name
          example: "Basic Rate"
        lowerLimit:
          type: number
          format: double
          description: Lower limit of band
          example: 12570
        upperLimit:
          type: number
          nullable: true
          format: double
          description: Upper limit (null for unlimited)
          example: 50270
        rate:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Tax rate percentage
          example: 20
        incomeType:
          type: string
          enum: [EMPLOYMENT, DIVIDEND, SAVINGS, CAPITAL_GAINS]
          description: Type of income this band applies to
      description: |
        Tax band and rate information.
  
        **UK Tax Bands 2024/25:**
        - Personal Allowance: £0 - £12,570 @ 0%
        - Basic Rate: £12,571 - £50,270 @ 20%
        - Higher Rate: £50,271 - £125,140 @ 40%
        - Additional Rate: £125,140+ @ 45%
  
    # Provider Entity
    Provider:
      type: object
      required:
        - name
        - providerType
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique provider identifier
        name:
          type: string
          maxLength: 200
          description: Provider/institution name
          example: "Aviva"
        providerType:
          type: string
          enum:
            - PENSION_PROVIDER
            - INVESTMENT_PLATFORM
            - INSURANCE_COMPANY
            - BANK
            - BUILDING_SOCIETY
            - MORTGAGE_LENDER
            - DISCRETIONARY_FUND_MANAGER
            - WEALTH_MANAGER
            - OTHER
          description: Type of provider
        fcanumber:
          type: string
          maxLength: 20
          description: FCA firm reference number
          example: "134630"
        website:
          type: string
          format: uri
          maxLength: 500
          description: Provider website URL
        contactPhone:
          type: string
          maxLength: 50
          description: Contact phone number
        contactEmail:
          type: string
          format: email
          maxLength: 200
          description: Contact email address
        address:
          $ref: '#/components/schemas/Address'
        isActive:
          type: boolean
          description: Whether provider is active
          default: true
        notes:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      description: |
        Financial services provider/institution reference data.
  
        Used for tracking:
        - Pension providers
        - Investment platforms
        - Insurance companies
        - Banks and building societies
        - Mortgage lenders
        - Discretionary fund managers
  
    # Adviser Entity
    Adviser:
      type: object
      required:
