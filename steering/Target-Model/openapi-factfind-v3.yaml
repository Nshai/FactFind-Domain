    # Control Options Schemas
    LiabilitiesControl:
      type: object
      properties:
        hasLiabilities:
          type: boolean
          nullable: true
          description: Has liabilities (loans, credit cards, overdrafts)
          example: true
        reductionOfLiabilities:
          $ref: '#/components/schemas/ReductionOfLiabilities'

    ReductionOfLiabilities:
      type: object
      properties:
        isExpected:
          type: boolean
          nullable: true
          description: Whether reduction of liabilities is expected/planned
          example: false
        nonReductionReason:
          $ref: '#/components/schemas/NonReductionReasonEnum'
