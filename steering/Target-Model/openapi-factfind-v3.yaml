  # ============================================================================
  # Financial Profile API (Singleton)
  # ============================================================================
  /factfinds/{id}/clients/{clientId}/financialprofile:
    get:
      tags:
        - Financial Profile
      summary: Get financial profile summary
      description: |
        Retrieves the financial profile summary for a client.

        **Business Rules:**
        - Singleton resource (one record per client)
        - Returns 404 if no financial profile exists
        - Contains calculated summary of client's finances
        - Aggregates data from Assets, Liabilities, Income, Expenditure contexts

        **Calculated Fields:**
        - totalAssets - sum of all asset values
        - totalLiabilities - sum of all liability values
        - netWorth - totalAssets minus totalLiabilities
        - totalAnnualIncome - sum of all income sources
        - totalAnnualExpenditure - sum of all expenditure
        - monthlySurplus - (totalAnnualIncome - totalAnnualExpenditure) / 12
        - liquidityRatio - liquid assets / monthly expenditure

        **Use Cases:**
        - Display financial overview dashboard
        - Assess client's financial health
        - Calculate affordability for recommendations
        - Track financial progress over time
      operationId: getFinancialProfile
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No financial profile exists for this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - OAuth2: [factfind]

    put:
      tags:
        - Financial Profile
      summary: Create or update financial profile
      description: |
        Creates or updates the financial profile summary for a client.

        **Business Rules:**
        - Singleton resource (one record per client)
        - Creates if doesn't exist, updates if exists
        - Full replacement of resource
        - Most fields are calculated automatically from related entities
        - Manual override fields available for adjustment

        **Calculation Logic:**
        - totalAssets calculated from Assets context
        - totalLiabilities calculated from Liabilities context
        - totalAnnualIncome calculated from Income context
        - totalAnnualExpenditure calculated from Expenditure context
        - Derived fields recalculated on update

        **Use Cases:**
        - Trigger recalculation of financial summary
        - Override calculated values with manual adjustments
        - Update financial profile timestamp
      operationId: createOrUpdateFinancialProfile
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
