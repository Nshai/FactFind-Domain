  # ===========================================================================
  # Asset API
  # ============================================================================
  /factfinds/{id}/assets:
    get:
      tags:
        - Asset
      summary: List assets for a FactFind
      description: |
        Retrieves all assets for a FactFind including property, business, cash, investments, and other valuables.

        **Business Rules:**
        - Returns all assets across all clients in the FactFind
        - Supports pagination via $top and $skip parameters
        - Can be filtered by assetType, ownershipType, businessReliefQualifying
        - Can be sorted using orderBy parameter

        **Asset Types:**
        - PROPERTY: Real estate (residential, buy-to-let, commercial)
        - BUSINESS: Business interests and trading companies
        - CASH: Cash savings, ISAs, premium bonds
        - INVESTMENT: Stocks, shares, bonds, collective investments
        - OTHER: Vehicles, jewelry, art, collectibles

        **Use Cases:**
        - Display complete asset portfolio
        - Calculate total asset value
        - Assess IHT exposure
        - Identify Business Property Relief opportunities
        - Track capital growth
      operationId: listAssets
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    post:
      tags:
        - Asset
      summary: Add an asset
      description: |
        Creates a new asset record.

        **Business Rules:**
        - assetType, description, and currentValue are required
        - System calculates capitalGrowth if originalValue provided
        - System calculates annualizedGrowth if purchasedOn provided
        - Ownership percentages must sum to 100%

        **IHT Planning:**
        - **RNRB (Residence Nil Rate Band):** Main residence passing to direct descendants qualifies for up to £175,000 additional relief
        - **Business Property Relief:** Trading businesses get 100% IHT relief after 2 years ownership
        - **Agricultural Property Relief:** Farmland may qualify for 50% or 100% relief

        **CGT (Capital Gains Tax):**
        - Main residence usually exempt (Private Residence Relief)
        - Other property: CGT at 18% (basic rate) or 28% (higher rate)
        - Business assets may qualify for Business Asset Disposal Relief (10% rate)
        - Annual exemption: £3,000 (2024/25)

        **Validation:**
        - currentValue must be positive
        - ownershipPercentage must be 0-100
        - If jointOwnershipType provided, ownershipType must be JOINT

        **Use Cases:**
        - Record primary residence
        - Add buy-to-let property
        - Document business ownership
        - Track cash savings
        - Record investment portfolios
      operationId: createAsset
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Asset'
            example:
              assetType: PROPERTY
              description: Primary Residence - 123 Main Street
              currentValue:
                amount: 450000.00
                currency:
                  code: GBP
              originalValue:
                amount: 325000.00
                currency:
                  code: GBP
              purchasedOn: '2018-05-10'
              valuedOn: '2026-01-15'
              valuationBasis: Comparable Sales
              ownership:
                ownershipType: JOINT
                jointOwnershipType: JOINT_TENANTS
                ownershipPercentage: 50.0
                owners:
                  - clientId: 8496
                    percentage: 50.0
                  - clientId: 8497
                    percentage: 50.0
              rnrbEligibility: Eligible
              property:
                id: 1
      responses:
        '201':
          description: Asset created successfully
          headers:
            Location:
              description: URI of the created asset
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  /factfinds/{id}/assets/{assetId}:
