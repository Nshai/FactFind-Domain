              type: string
              maxLength: 2000
        ihtLiability:
          type: object
          description: Inheritance Tax liability estimate
          properties:
            estimatedEstate:
              $ref: '#/components/schemas/MoneyValue'
            estimatedIHT:
              $ref: '#/components/schemas/MoneyValue'
            nilRateBandAvailable:
              $ref: '#/components/schemas/MoneyValue'
            residenceNilRateBand:
              $ref: '#/components/schemas/MoneyValue'
        gifts:
          type: array
          description: Array of gifts made (PETs tracking)
          readOnly: true
          items:
            $ref: '#/components/schemas/ReferenceLink'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    Gift:
      type: object
      required:
        - id
        - href
        - giftDate
        - recipient
        - giftValue
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 5012
        href:
          type: string
          format: uri
          readOnly: true
          example: /api/v3/factfinds/679/clients/8496/estateplanning/gifts/5012
        giftDate:
          type: string
          format: date
          description: Date gift was made
          example: '2023-12-25'
        recipient:
          type: object
          description: Gift recipient
          required:
            - name
          properties:
            name:
              type: string
              example: Emma Smith
            relationship:
              type: string
              example: Daughter
        giftValue:
          $ref: '#/components/schemas/MoneyValue'
        giftType:
          type: string
          enum:
            - Cash
            - Property
            - Shares
            - Other
          example: Cash
        exemption:
          type: object
          description: IHT exemption claimed
          properties:
            exemptionType:
              type: string
              enum:
                - AnnualExemption
                - SmallGifts
                - WeddingGift
                - NormalExpenditure
                - CharityGift
                - PoliticalPartyGift
                - None
              example: AnnualExemption
            exemptionAmount:
              $ref: '#/components/schemas/MoneyValue'
        pet:
          type: object
          description: Potentially Exempt Transfer tracking (7-year rule)
          readOnly: true
          properties:
            isPET:
              type: boolean
              description: Whether this is a PET
              example: true
            sevenYearDate:
              type: string
              format: date
              description: Date PET becomes fully exempt (7 years from gift)
              example: '2030-12-25'
            yearsRemaining:
              type: integer
              description: Years remaining until fully exempt
              example: 4
            taperRelief:
              type: integer
              description: Taper relief percentage if donor dies within 7 years
              example: 40
        notes:
          type: string
          maxLength: 1000
          description: Additional notes about the gift
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
  # ===========================================================================
  # Phase 3: Circumstances Context - Schemas
  # ===========================================================================

    # ===========================================================================
    # Enumerations
    # ===========================================================================

    EmploymentTimingEnum:
      type: string
      enum:
        - Current
        - Previous
        - Future
      description: Employment status indicator

    EmploymentTypeEnum:
      type: string
      enum:
        - Employed
        - SelfEmployed
        - Retired
        - Unemployed
        - Homemaker
        - Student
      description: Type of employment

    TaxPaymentMethodEnum:
      type: string
      enum:
        - PAYE
        - SelfAssessment
        - CIS
      description: |
        Tax payment method:
        - PAYE: Pay As You Earn (employed)
        - SelfAssessment: Self-employed tax returns
        - CIS: Construction Industry Scheme

    BusinessTypeEnum:
      type: string
      enum:
        - SoleTrader
        - Partnership
        - LimitedCompany
      description: Type of self-employment business structure

    IncomeTypeEnum:
      type: string
      enum:
        - Employment
        - Dividend
        - Rental
        - Pension
        - Benefits
        - Other
      description: Type of income source

    FrequencyCodeEnum:
      type: string
      enum:
        - A
        - M
        - W
        - F
        - Q
      description: |
        Frequency code:
        - A: Annually (1 per year)
        - M: Monthly (12 per year)
        - W: Weekly (52 per year)
        - F: Fortnightly (26 per year)
        - Q: Quarterly (4 per year)

    ExpenditureCategoryEnum:
      type: string
      enum:
        - Mortgage
        - Rent
        - CouncilTax
        - Gas
        - Electricity
        - Water
        - Food
        - Transport
        - Clothing
        - Furniture
        - TVInternet
        - PensionContributions
        - Childcare
        - Sports
        - Holidays
        - Entertainment
        - Investments
        - CreditCard
        - LoanRepayment
        - Insurance
        - Other
      description: |
        Expenditure category classification:
        - Essential: Mortgage, Rent, Council Tax, Gas, Electricity, Water, Food, Transport
        - Quality of Living: Clothing, Furniture, TV/Internet, Pension Contributions, Childcare
        - Non-Essential: Sports, Holidays, Entertainment, Investments, Credit Card payments

    AffordabilityRatingEnum:
      type: string
      enum:
        - Strong
        - Good
        - Fair
        - Marginal
        - Insufficient
      description: Affordability assessment rating

    # ===========================================================================
    # Value Types and Supporting Objects
    # ===========================================================================

    Occupation:
      type: object
      description: Occupation details with Standard Occupational Classification (SOC2020)
      properties:
        title:
          type: string
          maxLength: 200
          description: Occupation title
          example: Programmers and Software Development Professionals
        socCode:
          type: string
          maxLength: 10
          pattern: '^\d{4}$'
          description: Standard Occupational Classification code (4-digit SOC2020)
          example: '2136'
        socVersion:
          type: string
          maxLength: 20
          description: SOC version standard
          example: SOC2020
        description:
          type: string
          maxLength: 500
          description: Detailed occupation description

    EmploymentPeriod:
      type: object
      required:
        - startDate
      properties:
        startDate:
          type: string
          format: date
          description: Employment start date
          example: '2015-03-01'
        endDate:
          type: string
          nullable: true
          format: date
          description: Employment end date (null if current)
          example: null
        yearsEmployed:
          type: integer
          readOnly: true
          description: Calculated years of employment
          example: 11

    Earnings:
      type: object
      description: Employment earnings breakdown
      properties:
        grossAnnualSalary:
          $ref: '#/components/schemas/MoneyValue'
        netMonthlySalary:
          $ref: '#/components/schemas/MoneyValue'
        bonusAmount:
          $ref: '#/components/schemas/MoneyValue'
        overtimeAmount:
          $ref: '#/components/schemas/MoneyValue'
        commissionAmount:
          $ref: '#/components/schemas/MoneyValue'

    TaxInformation:
      type: object
      description: Tax payment information
      properties:
        paymentMethod:
          $ref: '#/components/schemas/TaxPaymentMethodEnum'
        taxCode:
          type: string
          maxLength: 20
          description: Current UK tax code
          example: '1257L'
        niNumber:
          type: string
          maxLength: 13
          pattern: '^[A-Z]{2}\d{6}[A-Z]$'
          description: National Insurance number
          example: AB123456C

    SelfEmploymentDetails:
      type: object
      description: Self-employment specific information
      properties:
        businessName:
          type: string
          maxLength: 200
          description: Trading name or business name
        businessType:
          $ref: '#/components/schemas/BusinessTypeEnum'
        companyNumber:
          type: string
          maxLength: 20
          description: Companies House registration number
        yearlyTurnover:
          $ref: '#/components/schemas/MoneyValue'
        netProfit:
          $ref: '#/components/schemas/MoneyValue'

    EmployerContact:
      type: object
      description: Employer contact information
      properties:
        phone:
          type: string
          maxLength: 50
          description: Contact phone number
        email:
          type: string
          maxLength: 255
          format: email
          description: Contact email address
        address:
          $ref: '#/components/schemas/Address'

    FrequencyDetail:
      type: object
      required:
        - code
        - periodsPerYear
      description: Payment frequency details
      properties:
        code:
          $ref: '#/components/schemas/FrequencyCodeEnum'
        display:
          type: string
          description: Display text for frequency
          example: Monthly
        periodsPerYear:
          type: integer
          minimum: 1
          maximum: 365
          description: Number of periods per year
          example: 12

    IncomePeriod:
      type: object
      required:
        - startDate
      description: Income period dates
      properties:
        startDate:
          type: string
          format: date
          description: Income start date
        endDate:
          type: string
          nullable: true
          format: date
          description: Income end date (null if ongoing)

    ExpenditurePeriod:
      type: object
      required:
        - startDate
      description: Expenditure period dates
      properties:
        startDate:
          type: string
          format: date
          description: Expenditure start date
        endDate:
          type: string
          nullable: true
          format: date
          description: Expenditure end date (null if ongoing)

    TaxRate:
      type: object
      required:
        - percentage
      description: Tax rate information
      properties:
        percentage:
          type: number
          format: float
          enum: [0, 10, 19, 20, 21, 22, 40, 41, 42, 45, 46, 47, 48]
          description: |
            Tax rate percentage (UK & Scottish variations):
            - 0%: No taxable income or within personal allowance
            - 19-22%: Basic/starter rates (UK & Scottish variations)
            - 40-42%: Higher rates (UK & Scottish variations)
            - 45-48%: Additional/top rates (UK & Scottish variations)

    StressTest:
      type: object
      description: FCA stress test results (3% interest rate increase)
      properties:
        proposedRate:
          type: number
          format: float
          description: Proposed mortgage interest rate
          example: 5.5
        stressedRate:
          type: number
          format: float
          description: Rate after 3% stress test increase
          example: 8.5
        proposedPayment:
          $ref: '#/components/schemas/MoneyValue'
        stressedPayment:
          $ref: '#/components/schemas/MoneyValue'
        remainingIncome:
          $ref: '#/components/schemas/MoneyValue'
        passes:
          type: boolean
          description: Whether client passes the stress test
          example: true

    # ===========================================================================
    # Domain Entities
    # ===========================================================================

    Employment:
      type: object
      required:
        - employmentStatus
        - employmentType
      description: Client employment record with earnings, tax, and occupation details
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique employment record identifier
        href:
          type: string
          format: uri
          readOnly: true
          description: API link to this employment record
        client:
          $ref: '#/components/schemas/ClientReference'
        factfind:
          $ref: '#/components/schemas/ReferenceLink'
        employmentStatus:
          $ref: '#/components/schemas/EmploymentStatusEnum'
        employmentType:
          $ref: '#/components/schemas/EmploymentTypeEnum'
        employerName:
          type: string
          maxLength: 200
          description: Employer name (required if Employed)
        jobTitle:
          type: string
          maxLength: 200
          description: Job title or occupation
        occupation:
          $ref: '#/components/schemas/Occupation'
        employmentPeriod:
          $ref: '#/components/schemas/EmploymentPeriod'
        earnings:
          $ref: '#/components/schemas/Earnings'
        taxInformation:
          $ref: '#/components/schemas/TaxInformation'
        selfEmploymentDetails:
          $ref: '#/components/schemas/SelfEmploymentDetails'
        employerContact:
          $ref: '#/components/schemas/EmployerContact'
        isPrimary:
          type: boolean
          description: Whether this is primary employment
          example: true
        hoursPerWeek:
          type: number
          format: float
          description: Hours worked per week
          example: 37.5
        notes:
          type: string
          maxLength: 1000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    EmploymentSummary:
      type: object
      description: |
        Singleton resource providing aggregated employment and income summary for a client.
        totalGrossAnnualIncome is automatically calculated from all income sources.
      properties:
        href:
          type: string
          format: uri
          readOnly: true
          description: API link to this resource
        factfind:
          $ref: '#/components/schemas/ReferenceLink'
        client:
          $ref: '#/components/schemas/ClientReference'
