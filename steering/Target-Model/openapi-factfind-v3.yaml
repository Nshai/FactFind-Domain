              description: Chronic condition now managed effectively
              identifiedDate: '2026-02-15'
              isActive: false
              resolvedDate: '2026-03-01'
              resolutionNotes: Condition stabilized, no longer requires additional support
              requiresOngoingSupport: false
      responses:
