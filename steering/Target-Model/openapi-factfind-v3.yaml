      summary: Get estate planning singleton
      description: |
        Retrieves estate planning information for a client.

        **Includes:**
        - Will status and executors
        - Power of Attorney arrangements
        - Trust arrangements
        - IHT liability estimates
        - Array of gifts made (PETs)

        **IHT Planning:**
        - Tracks potentially exempt transfers (7-year rule)
        - Calculates taper relief
        - Monitors nil rate bands
      operationId: getEstatePlanning
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Successful response
