  # ============================================================================
  # Affordability API
  # ============================================================================
  /factfinds/{id}/clients/{clientId}/affordability:
    get:
      tags:
        - Affordability
      summary: Get affordability assessment
      description: |
        Retrieves the current affordability assessment for a client.

        **Business Rules:**
        - Returns calculated affordability metrics
        - Includes income multiples, LTI, DTI ratios
        - Shows stress test results (FCA 3% increase)
        - Provides recommendations and warnings

        **FCA MCOB 11 Compliance:**
        - Income multiple calculations (typically 4.5x max)
        - Stress testing at +3% interest rate
        - Committed expenditure analysis
        - Disposable income assessment

        **Calculations:**
        - totalAnnualIncome: Sum of all income sources
        - totalCommittedExpenditure: Sum of essential expenditure
        - netDisposableIncome: Income minus all expenditure
        - maxLoanAmount: Based on income multiple (typically 4.5x)
        - loanToIncomeRatio: Proposed loan / annual income
        - debtToIncomeRatio: Total debt payments / income

        **Stress Testing:**
        - Proposed rate: Actual mortgage rate
        - Stressed rate: Proposed rate + 3%
        - Must afford payments at stressed rate
        - Minimum remaining income threshold

        **Use Cases:**
        - Mortgage application assessment
        - Pre-approval calculations
        - Remortgage affordability
        - Product suitability evidence
      operationId: getAffordability
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Affordability'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  /factfinds/{id}/clients/{clientId}/affordability/calculate:
    post:
      tags:
        - Affordability
      summary: Calculate affordability for proposed loan
      description: |
        Performs affordability calculation for a proposed loan amount and terms.

        **Business Rules:**
        - Requires proposedLoanAmount, proposedMortgageRate, loanTermYears, repaymentType
        - Performs FCA stress test (+3% rate)
        - Calculates income multiples and debt ratios
        - Provides affordability rating and recommendations

        **FCA MCOB 11 Requirements:**
        - Must assess affordability against current and future income
        - Must stress test at current rate + 3%
        - Must consider committed expenditure
        - Must ensure minimum disposable income remains
        - Cannot exclude essential expenditure

        **Affordability Ratings:**
        - **Strong:** LTI < 3.5x, DTI < 30%, passes stress test with margin
        - **Good:** LTI 3.5-4x, DTI 30-35%, passes stress test
        - **Fair:** LTI 4-4.5x, DTI 35-40%, passes stress test
        - **Marginal:** LTI 4.5x+, DTI 40-45%, barely passes stress test
        - **Insufficient:** Fails stress test or DTI > 45%

        **Calculations:**
        - Monthly payment: Based on loan amount, rate, term, and repayment type
        - Stressed payment: Monthly payment at proposed rate + 3%
        - Remaining income: Monthly income minus stressed payment and expenditure
        - Income multiple: Loan amount / annual gross income
        - LTI ratio: Loan amount / total annual income
        - DTI ratio: (Total debt payments / monthly income) * 100

        **Use Cases:**
        - Calculate maximum borrowing
        - Assess specific loan proposal
        - Compare different loan scenarios
        - Generate affordability evidence for lender
      operationId: calculateAffordability
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AffordabilityRequest'
            example:
              proposedLoanAmount:
                amount: 300000.00
                currency:
                  code: GBP
              proposedMortgageRate: 5.5
              loanTermYears: 25
              repaymentType: Repayment
      responses:
        '200':
          description: Affordability calculation completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Affordability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  /factfinds/{id}/clients/{clientId}/affordability/history:
    get:
      tags:
        - Affordability
      summary: Get affordability calculation history
      description: |
        Retrieves the history of affordability calculations for a client.

        **Business Rules:**
        - Returns all previous affordability calculations
        - Ordered by calculation date (most recent first)
        - Includes calculation parameters and results
        - Useful for tracking changes over time

