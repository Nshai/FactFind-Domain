    # ============================================================================
    # OBJECTIVES API SCHEMAS
    # ============================================================================
  
    # Enumerations
    ObjectiveCategoryEnum:
      type: string
      enum:
        - RETIREMENT
        - INVESTMENT
        - PROTECTION
        - MORTGAGE
        - EDUCATION
        - ESTATE_PLANNING
        - TAX_PLANNING
        - INCOME
        - DEBT_REDUCTION
        - EMERGENCY_FUND
        - OTHER
      description: |
        Category of financial objective.
        - RETIREMENT: Retirement planning and pension accumulation
        - INVESTMENT: Investment growth and wealth accumulation
        - PROTECTION: Protection needs and insurance planning
        - MORTGAGE: Home purchase or mortgage planning
        - EDUCATION: Education funding for children
        - ESTATE_PLANNING: Inheritance and estate planning
        - TAX_PLANNING: Tax efficiency and mitigation
        - INCOME: Income generation and cash flow
        - DEBT_REDUCTION: Debt consolidation and reduction
        - EMERGENCY_FUND: Emergency savings buffer
        - OTHER: Other financial goals
  
    ObjectivePriorityEnum:
      type: string
      enum:
        - CRITICAL
        - HIGH
        - MEDIUM
        - LOW
      description: |
        Priority level of objective.
        - CRITICAL: Must achieve (e.g., debt repayment, essential protection)
        - HIGH: Important goals (e.g., retirement, education)
        - MEDIUM: Desirable goals (e.g., home improvements)
        - LOW: Nice to have (e.g., luxury purchases)
  
    ObjectiveStatusEnum:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - ACHIEVED
        - DEFERRED
        - CANCELLED
      description: Current status of objective
  
    TimeHorizonEnum:
      type: string
      enum:
        - SHORT_TERM
        - MEDIUM_TERM
        - LONG_TERM
      description: |
        Time horizon for achieving objective.
        - SHORT_TERM: 0-5 years
        - MEDIUM_TERM: 5-10 years
        - LONG_TERM: 10+ years
  
    # Value Types
    ObjectiveProgress:
      type: object
      properties:
        currentValue:
          $ref: '#/components/schemas/MoneyValue'
        targetValue:
          $ref: '#/components/schemas/MoneyValue'
        percentageComplete:
          type: number
          format: float
          minimum: 0
          maximum: 100
          readOnly: true
          description: Calculated as (currentValue / targetValue) * 100
        onTrack:
          type: boolean
          readOnly: true
          description: Whether objective is on track based on time remaining
        requiredMonthlySavings:
          $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Monthly savings required to achieve target
      description: Progress tracking for objective
  
    LinkedResource:
      type: object
      properties:
        resourceType:
          type: string
          enum: [INVESTMENT, PENSION, ASSET, PROTECTION, MORTGAGE]
          description: Type of linked resource
        resourceId:
          type: integer
          description: ID of linked resource
        contribution:
          $ref: '#/components/schemas/MoneyValue'
          description: How much this resource contributes to objective
      description: Resources linked to achieving this objective
  
    # Domain Entity
    Objective:
      type: object
      required:
        - clientIds
        - category
        - title
        - priority
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the objective
        clientIds:
          type: array
          items:
            type: integer
          minItems: 1
          description: Clients this objective applies to
        category:
          $ref: '#/components/schemas/ObjectiveCategoryEnum'
        title:
          type: string
          maxLength: 200
          description: Short title/name for the objective
        description:
          type: string
          maxLength: 2000
          description: Detailed description of the objective
        priority:
          $ref: '#/components/schemas/ObjectivePriorityEnum'
        status:
          $ref: '#/components/schemas/ObjectiveStatusEnum'
        timeHorizon:
          $ref: '#/components/schemas/TimeHorizonEnum'
        targetDate:
          type: string
          format: date
          description: Target date to achieve objective
        targetAmount:
          $ref: '#/components/schemas/MoneyValue'
        progress:
          $ref: '#/components/schemas/ObjectiveProgress'
        linkedResources:
          type: array
          items:
            $ref: '#/components/schemas/LinkedResource'
          description: Products/resources contributing to this objective
        riskTolerance:
          type: string
          enum: [CAUTIOUS, BALANCED, ADVENTUROUS]
          description: Risk tolerance for this specific objective
        assumptions:
          type: object
          properties:
            inflationRate:
              type: number
              format: float
            growthRate:
              type: number
              format: float
            contributionIncrease:
              type: number
              format: float
          description: Assumptions used in calculations
        achievedDate:
          type: string
          format: date
          description: Date objective was achieved
        notes:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      description: |
        Represents a financial objective or goal.
  
        **Objective Planning:**
        - SMART framework: Specific, Measurable, Achievable, Relevant, Time-bound
        - Prioritization: Critical needs vs wants
        - Resource allocation: Match products to objectives
        - Progress tracking: Regular reviews and adjustments
  
        **Common Objectives:**
        - Retirement at age X with income of £Y
        - University education funding £Z in N years
        - Emergency fund 3-6 months expenses
        - Mortgage repayment by date
        - Estate planning to minimize IHT
        - Generate additional income of £X per month
  
    # Collection
    ObjectiveCollection:
      type: object
      properties:
        href:
          type: string
          format: uri
          example: "/api/v2/factfinds/123/objectives"
        items:
          type: array
          items:
            $ref: '#/components/schemas/Objective'
        count:
          type: integer
          description: Total number of objectives
        summary:
          type: object
          properties:
            byCat egory:
              type: object
              additionalProperties:
                type: integer
              description: Count by category
            byPriority:
              type: object
              additionalProperties:
                type: integer
              description: Count by priority
            byStatus:
              type: object
              additionalProperties:
                type: integer
              description: Count by status
  
    # ============================================================================
    # ATR ASSESSMENT API SCHEMAS
    # ============================================================================
  
    # Enumerations
    ATRRatingEnum:
      type: string
      enum:
        - VERY_CAUTIOUS
        - CAUTIOUS
        - BALANCED
        - ADVENTUROUS
        - VERY_ADVENTUROUS
      description: |
        Attitude to Risk rating.
        - VERY_CAUTIOUS: Risk level 1-2, minimal volatility tolerance
        - CAUTIOUS: Risk level 3-4, low volatility tolerance
        - BALANCED: Risk level 5-6, moderate volatility tolerance
        - ADVENTUROUS: Risk level 7-8, high volatility tolerance
        - VERY_ADVENTUROUS: Risk level 9-10, very high volatility tolerance
  
    CapacityForLossEnum:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
      description: |
        Capacity for loss assessment.
        - LOW: Limited ability to absorb losses without impacting lifestyle
        - MEDIUM: Can absorb moderate losses without significant impact
        - HIGH: Can absorb significant losses without impacting lifestyle
  
    InvestmentExperienceLevelEnum:
      type: string
      enum:
        - NONE
        - LIMITED
        - MODERATE
        - EXTENSIVE
      description: Level of investment experience
  
    # Value Types
    ATRQuestionResponse:
      type: object
      required:
        - questionId
        - answer
      properties:
        questionId:
          type: string
          description: Unique identifier for the question
        questionText:
          type: string
          description: The question that was asked
        answer:
          type: string
          description: The client's answer
        score:
          type: integer
          description: Score assigned to this answer
      description: Individual question response in ATR questionnaire
  
    InvestmentExperience:
      type: object
      properties:
        experienceLevel:
          $ref: '#/components/schemas/InvestmentExperienceLevelEnum'
        hasOwnedEquities:
          type: boolean
        hasOwnedFunds:
          type: boolean
        hasOwnedBonds:
          type: boolean
        hasOwnedAlternatives:
          type: boolean
        yearsInvesting:
          type: integer
          minimum: 0
        notes:
          type: string
          maxLength: 1000
      description: Client's investment experience details
  
    TimeHorizonDetails:
      type: object
      properties:
        investmentPeriodYears:
          type: integer
          minimum: 0
          description: Number of years until funds needed
        targetRetirementAge:
          type: integer
          minimum: 0
        yearsToRetirement:
          type: integer
          minimum: 0
          readOnly: true
        canLockUpFunds:
          type: boolean
          description: Whether client can lock up funds for extended period
      description: Investment time horizon details
  
    VolatilityTolerance:
      type: object
      properties:
        maxAcceptableLoss:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Maximum acceptable loss percentage
        reactionToLosses:
          type: string
          enum: [SELL_IMMEDIATELY, HOLD, BUY_MORE]
        portfolioReviewFrequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY, QUARTERLY, ANNUALLY, RARELY]
      description: Client's tolerance for investment volatility
  
    # Domain Entity
    ATRAssessment:
      type: object
      required:
        - clientId
        - assessmentDate
        - rating
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the ATR assessment
        clientId:
          type: integer
          description: Client this assessment is for
        assessmentDate:
          type: string
          format: date
          description: Date assessment was completed
        rating:
          $ref: '#/components/schemas/ATRRatingEnum'
        riskScore:
          type: integer
          minimum: 1
          maximum: 10
          description: Numerical risk score (1=very cautious, 10=very adventurous)
        capacityForLoss:
          $ref: '#/components/schemas/CapacityForLossEnum'
        investmentExperience:
          $ref: '#/components/schemas/InvestmentExperience'
        timeHorizon:
          $ref: '#/components/schemas/TimeHorizonDetails'
        volatilityTolerance:
          $ref: '#/components/schemas/VolatilityTolerance'
        questionnaireResponses:
          type: array
          items:
            $ref: '#/components/schemas/ATRQuestionResponse'
          description: Responses to ATR questionnaire questions
        questionnaireName:
          type: string
          maxLength: 200
          description: Name of ATR questionnaire used
        questionnaireVersion:
          type: string
          maxLength: 50
          description: Version of questionnaire
        totalQuestions:
          type: integer
          description: Total number of questions in questionnaire
        totalScore:
          type: integer
          description: Total score from all questions
        assessedBy:
          type: string
          maxLength: 200
          description: Adviser who conducted assessment
        validUntil:
          type: string
          format: date
          description: Date when assessment expires (typically 12 months)
        isValid:
          type: boolean
          readOnly: true
          description: Whether assessment is still valid
        reviewDate:
          type: string
          format: date
          description: Date for next review
        previousAssessmentId:
          type: integer
          description: Reference to previous assessment for comparison
        hasChangedSinceLastAssessment:
          type: boolean
          description: Whether rating has changed from previous assessment
        notes:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      description: |
        Represents an Attitude to Risk (ATR) assessment.
  
        **FCA Requirements:**
        - ATR assessment mandatory for investment advice (COBS 9.2)
        - Must assess client's risk tolerance and capacity for loss
        - Must be reviewed regularly (typically annually or on life changes)
        - Must consider knowledge, experience, and financial situation
  
        **Assessment Components:**
        1. **Attitude to Risk:** Psychological willingness to take risk
        2. **Capacity for Loss:** Financial ability to absorb losses
        3. **Investment Experience:** Knowledge and understanding
        4. **Time Horizon:** When funds will be needed
  
        **Risk Ratings:**
        - Very Cautious (1-2): Cash, short bonds, capital preservation
        - Cautious (3-4): 20-40% equities, defensive
        - Balanced (5-6): 40-60% equities, balanced growth
        - Adventurous (7-8): 60-80% equities, growth focused
        - Very Adventurous (9-10): 80-100% equities, maximum growth
  
        **Validity:**
        - Assessments typically valid for 12 months
        - Review triggered by life events (retirement, inheritance, job loss)
        - Material changes in circumstances require new assessment
  
    # Collection
    ATRAssessmentCollection:
      type: object
      properties:
        href:
          type: string
          format: uri
          example: "/api/v2/factfinds/123/atr-assessments"
        items:
          type: array
          items:
            $ref: '#/components/schemas/ATRAssessment'
        count:
          type: integer
          description: Total number of ATR assessments
        currentAssessment:
          $ref: '#/components/schemas/ATRAssessment'
          description: Most recent valid assessment
        assessmentHistory:
          type: array
          items:
            type: object
            properties:
              assessmentId:
                type: integer
              assessmentDate:
                type: string
                format: date
              rating:
                $ref: '#/components/schemas/ATRRatingEnum'
              riskScore:
                type: integer
          description: Historical ratings for trend analysis
