          description: Unique adviser identifier
        title:
          type: string
          maxLength: 50
          example: "Mr"
        firstName:
          type: string
          maxLength: 100
          description: Adviser first name
          example: "John"
        lastName:
          type: string
          maxLength: 100
          description: Adviser last name
          example: "Smith"
        adviserType:
          type: string
          enum:
            - FINANCIAL_ADVISER
            - PARAPLANNER
            - ADMINISTRATOR
            - MANAGER
            - COMPLIANCE_OFFICER
          description: Type of adviser/role
        cfpNumber:
          type: string
          maxLength: 20
          description: Chartered Financial Planner number
        dipPFSNumber:
          type: string
          maxLength: 20
          description: Diploma in Financial Planning number
        fcaIndividualReference:
          type: string
          maxLength: 20
          description: FCA individual reference number
        email:
          type: string
          format: email
          maxLength: 200
          description: Email address
        phone:
          type: string
          maxLength: 50
          description: Phone number
        mobile:
          type: string
          maxLength: 50
          description: Mobile number
        officeId:
          type: integer
          description: Reference to office/branch
        isActive:
          type: boolean
          description: Whether adviser is currently active
          default: true
        startDate:
          type: string
          format: date
          description: Start date with firm
        endDate:
          type: string
          format: date
          description: End date with firm (if left)
        notes:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      description: |
        Adviser and paraplanner reference data.
  
        **Qualifications:**
        - CFP: Chartered Financial Planner
        - Dip PFS: Diploma in Regulated Financial Planning (Level 4)
        - AF: Advanced Financial Planning Certificate (Level 6)
        - CF: Chartered Fellow
  
    # Office/Branch Entity
    Office:
      type: object
      required:
        - name
        - address
      properties:
        id:
          type: integer
