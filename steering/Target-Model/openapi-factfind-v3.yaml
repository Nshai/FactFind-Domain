          example: Client prefers to maintain liquidity for flexibility and investment opportunities.
  
    # ============================================================================
    # MORTGAGE API SCHEMAS
    # ============================================================================
  
    # Enumerations
    MortgageTypeEnum:
      type: string
      enum:
        - RESIDENTIAL
        - BUY_TO_LET
        - EQUITY_RELEASE
        - SECOND_HOME
        - COMMERCIAL
      description: |
        Type of mortgage arrangement.
        - RESIDENTIAL: Main residence mortgage
        - BUY_TO_LET: Investment property mortgage
        - EQUITY_RELEASE: Lifetime mortgage or home reversion
        - SECOND_HOME: Holiday/second home mortgage
        - COMMERCIAL: Commercial property mortgage
  
    MortgageRateTypeEnum:
      type: string
      enum:
        - FIXED
        - VARIABLE
        - TRACKER
        - DISCOUNT
        - CAPPED
      description: |
        Type of mortgage interest rate.
        - FIXED: Fixed rate for specified period
        - VARIABLE: Lender's standard variable rate
        - TRACKER: Tracks Bank of England base rate
        - DISCOUNT: Discount from lender's SVR
        - CAPPED: Maximum rate ceiling
  
    MortgageRepaymentMethodEnum:
      type: string
      enum:
        - REPAYMENT
        - INTEREST_ONLY
        - PART_AND_PART
      description: |
        Method of mortgage repayment.
        - REPAYMENT: Capital and interest paid monthly
        - INTEREST_ONLY: Only interest paid, capital due at end
        - PART_AND_PART: Combination of repayment and interest-only
  
    RepaymentVehicleTypeEnum:
      type: string
      enum:
        - INVESTMENT
        - PENSION
        - ENDOWMENT
        - ISA
        - SALE_OF_PROPERTY
        - INHERITANCE
        - OTHER
        - NONE
      description: |
        Planned repayment vehicle for interest-only mortgages.
  
    # Value Types
    MortgageOwner:
      type: object
      required:
        - clientId
      properties:
        clientId:
          type: integer
          description: Reference to client who owns this mortgage
        percentage:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Percentage ownership (for joint mortgages)
      description: Mortgage owner with ownership percentage for joint mortgages
  
    RateDetails:
      type: object
      properties:
        currentRate:
          type: number
          format: float
          description: Current interest rate percentage
        rateType:
          $ref: '#/components/schemas/MortgageRateTypeEnum'
        fixedUntil:
          type: string
          format: date
          description: Date when fixed rate period ends
        revertToRate:
          type: number
          format: float
          description: Rate after fixed period ends (typically SVR)
        trackerMargin:
          type: number
          format: float
          description: Margin above base rate for tracker mortgages
      description: Mortgage interest rate details
  
    RepaymentVehicle:
      type: object
      properties:
        vehicleType:
          $ref: '#/components/schemas/RepaymentVehicleTypeEnum'
        currentValue:
          $ref: '#/components/schemas/MoneyValue'
        projectedValue:
          $ref: '#/components/schemas/MoneyValue'
        linkedResourceId:
          type: integer
          description: ID of linked investment/pension resource
        notes:
          type: string
          maxLength: 1000
      description: Repayment vehicle for interest-only mortgages
  
    # Domain Entity
    Mortgage:
      type: object
      required:
        - owners
        - mortgageType
        - lender
        - originalLoanAmount
        - amountOutstanding
        - interestRate
        - monthlyPayment
        - repaymentMethod
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the mortgage
        owners:
          type: array
          items:
            $ref: '#/components/schemas/MortgageOwner'
          minItems: 1
          description: Mortgage owners (single or joint)
        mortgageType:
          $ref: '#/components/schemas/MortgageTypeEnum'
        lender:
          type: string
          maxLength: 200
          description: Name of mortgage lender/provider
        accountNumber:
          type: string
          maxLength: 50
          description: Mortgage account reference number
        linkedPropertyId:
          type: integer
          description: Reference to property asset this mortgage secures
        linkedLiabilityId:
          type: integer
          description: Reference to liability record if tracked there
        originalLoanAmount:
          $ref: '#/components/schemas/MoneyValue'
        amountOutstanding:
          $ref: '#/components/schemas/MoneyValue'
        monthlyPayment:
          $ref: '#/components/schemas/MoneyValue'
        interestRate:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Current interest rate percentage
        rateDetails:
          $ref: '#/components/schemas/RateDetails'
        repaymentMethod:
          $ref: '#/components/schemas/MortgageRepaymentMethodEnum'
        repaymentVehicle:
          $ref: '#/components/schemas/RepaymentVehicle'
        startDate:
          type: string
          format: date
          description: Mortgage start date
        endDate:
          type: string
          format: date
          description: Mortgage end date (maturity)
        termYears:
          type: integer
          minimum: 1
          maximum: 50
          description: Original term in years
        termRemainingMonths:
          type: integer
          minimum: 0
          description: Months remaining on term
        loanToValue:
          type: number
          format: float
          minimum: 0
          maximum: 100
          readOnly: true
          description: Loan-to-value ratio as percentage (calculated if property value known)
        earlyRepaymentCharge:
          $ref: '#/components/schemas/MoneyValue'
        productTransferDate:
          type: string
          format: date
          description: Date when product transfer/remortgage is planned
        isPortable:
          type: boolean
          description: Whether mortgage is portable to new property
        notes:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      description: |
        Represents a mortgage arrangement on a property.
  
        **FCA MCOB Requirements:**
        - Affordability assessment required
        - Interest rate stress testing at +3% or lender's reversion rate
        - Repayment strategy required for interest-only mortgages
  
        **Equity Release (Lifetime Mortgages):**
        - No monthly payments
        - Interest rolls up
        - Typically has no negative equity guarantee
        - Subject to Equity Release Council standards
  
    # Collection
    MortgageCollection:
      type: object
      properties:
        href:
          type: string
          format: uri
          example: "/api/v2/factfinds/123/mortgages"
        items:
          type: array
          items:
            $ref: '#/components/schemas/Mortgage'
        count:
          type: integer
          description: Total number of mortgages
        totalOutstanding:
          $ref: '#/components/schemas/MoneyValue'
          description: Total outstanding across all mortgages
        totalMonthlyPayments:
          $ref: '#/components/schemas/MoneyValue'
          description: Total monthly payments across all mortgages
  
    # ============================================================================
    # PERSONAL PROTECTION API SCHEMAS
    # ============================================================================
  
    # Enumerations
    ProtectionProductTypeEnum:
      type: string
      enum:
        - LIFE_INSURANCE
        - CRITICAL_ILLNESS
        - LIFE_AND_CRITICAL_ILLNESS
        - INCOME_PROTECTION
        - ACCIDENT_SICKNESS_UNEMPLOYMENT
        - PRIVATE_MEDICAL_INSURANCE
        - BUILDINGS_INSURANCE
        - CONTENTS_INSURANCE
        - FAMILY_INCOME_BENEFIT
      description: |
        Type of protection product.
        - LIFE_INSURANCE: Life cover only (level or decreasing term, whole of life)
        - CRITICAL_ILLNESS: Critical illness cover only
        - LIFE_AND_CRITICAL_ILLNESS: Combined life and critical illness cover
        - INCOME_PROTECTION: Long-term income protection (IP)
        - ACCIDENT_SICKNESS_UNEMPLOYMENT: Short-term ASU cover
        - PRIVATE_MEDICAL_INSURANCE: Private medical insurance (PMI)
        - BUILDINGS_INSURANCE: Buildings insurance
        - CONTENTS_INSURANCE: Contents insurance
        - FAMILY_INCOME_BENEFIT: Regular income on death (FIB)
  
    LifeCoverTypeEnum:
      type: string
      enum:
        - LEVEL_TERM
        - DECREASING_TERM
        - INCREASING_TERM
        - WHOLE_OF_LIFE
        - FAMILY_INCOME_BENEFIT
      description: |
        Type of life cover structure.
        - LEVEL_TERM: Fixed sum assured throughout term
        - DECREASING_TERM: Sum assured reduces (mortgage protection)
        - INCREASING_TERM: Sum assured increases (inflation protection)
        - WHOLE_OF_LIFE: Cover for entire life
        - FAMILY_INCOME_BENEFIT: Regular income payments on death
  
    ProtectionStatusEnum:
      type: string
      enum:
        - ACTIVE
        - LAPSED
        - CLAIMED
        - EXPIRED
        - CANCELLED
      description: Current status of protection policy
  
    UnderwritingTypeEnum:
      type: string
      enum:
        - FULL_UNDERWRITING
        - MORATORIUM
        - CONTINUED_PERSONAL_MEDICAL_EXCLUSIONS
        - GUARANTEED_ACCEPTANCE
      description: |
        Type of underwriting applied to the policy.
        - FULL_UNDERWRITING: Full medical underwriting at application
        - MORATORIUM: Pre-existing conditions excluded for specified period
        - CONTINUED_PERSONAL_MEDICAL_EXCLUSIONS: Specific exclusions listed
        - GUARANTEED_ACCEPTANCE: No underwriting (typically lower cover amounts)
  
    # Value Types
    ProtectionOwner:
      type: object
      required:
        - clientId
      properties:
        clientId:
          type: integer
          description: Reference to client who owns this policy
        isLifeAssured:
          type: boolean
          description: Whether this owner is a life assured
      description: Policy owner and life assured indicator
  
    Beneficiary:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200
          description: Name of beneficiary
        relationship:
          type: string
          maxLength: 100
          description: Relationship to policy owner
        percentage:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Percentage of benefit
        clientId:
          type: integer
          description: Reference to client if beneficiary is a client
      description: Policy beneficiary
  
    TrustDetails:
      type: object
      properties:
        isInTrust:
          type: boolean
          description: Whether policy is written in trust
        trustType:
          type: string
          maxLength: 100
          description: Type of trust (e.g., Absolute, Discretionary, Bare)
        trustees:
          type: array
          items:
            type: string
          description: Names of trustees
        trustDate:
          type: string
          format: date
          description: Date trust was established
      description: Trust arrangement details
  
    UnderwritingDetails:
      type: object
      properties:
        underwritingType:
          $ref: '#/components/schemas/UnderwritingTypeEnum'
        medicalExclusions:
          type: array
          items:
            type: string
          description: List of medical exclusions
        loadings:
          type: array
          items:
            type: object
            properties:
              reason:
                type: string
              percentage:
                type: number
                format: float
          description: Premium loadings applied
        moratoriumPeriod:
          type: integer
          description: Moratorium period in months
      description: Underwriting and exclusions
  
    ClaimHistory:
      type: object
      properties:
        hasClaims:
          type: boolean
        claims:
          type: array
          items:
            type: object
            properties:
              claimDate:
                type: string
                format: date
              claimType:
                type: string
              amountClaimed:
                $ref: '#/components/schemas/MoneyValue'
              amountPaid:
                $ref: '#/components/schemas/MoneyValue'
              status:
                type: string
                enum: [PENDING, APPROVED, REJECTED, PAID]
      description: Claims history for this policy
  
    # Domain Entity
    Protection:
      type: object
      required:
        - owners
        - protectionType
        - provider
        - coverAmount
        - premium
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the protection policy
        owners:
          type: array
          items:
            $ref: '#/components/schemas/ProtectionOwner'
          minItems: 1
          description: Policy owners and lives assured
        protectionType:
          $ref: '#/components/schemas/ProtectionProductTypeEnum'
        lifeCoverType:
          $ref: '#/components/schemas/LifeCoverTypeEnum'
        provider:
          type: string
          maxLength: 200
          description: Insurance provider/company
        policyNumber:
          type: string
          maxLength: 50
          description: Policy reference number
        coverAmount:
          $ref: '#/components/schemas/MoneyValue'
        premium:
          $ref: '#/components/schemas/MoneyValue'
        premiumFrequency:
          $ref: '#/components/schemas/FrequencyValue'
        annualPremium:
          $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Calculated annual premium
        startDate:
          type: string
          format: date
          description: Policy start date
        endDate:
          type: string
          format: date
          description: Policy end date (if term assurance)
        reviewDate:
          type: string
          format: date
          description: Next policy review date
        status:
          $ref: '#/components/schemas/ProtectionStatusEnum'
        beneficiaries:
          type: array
          items:
            $ref: '#/components/schemas/Beneficiary'
          description: Policy beneficiaries
        trustDetails:
          $ref: '#/components/schemas/TrustDetails'
        underwritingDetails:
          $ref: '#/components/schemas/UnderwritingDetails'
        linkedLiabilityId:
          type: integer
          description: Reference to liability this policy protects
        deferredPeriod:
          type: integer
          description: Deferred period in weeks (for income protection)
        benefitPeriod:
          type: integer
          description: Benefit period in months (for income protection, ASU)
        claimHistory:
          $ref: '#/components/schemas/ClaimHistory'
        isIndexLinked:
          type: boolean
          description: Whether cover increases with inflation
        isGuaranteedPremium:
          type: boolean
          description: Whether premium is guaranteed not to increase
        isRenewable:
          type: boolean
          description: Whether policy is renewable at end of term
        commissionReceived:
          $ref: '#/components/schemas/MoneyValue'
        adviceGiven:
          type: boolean
          description: Whether regulated advice was given
        notes:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      description: |
        Represents a personal protection insurance policy.
  
        **FCA ICOBS/IDD Requirements:**
        - Demands and needs statement required
        - Suitability letter for advised sales
        - Product disclosure required
        - Annual renewal notices (general insurance)
  
        **Protection Types:**
        - Life Insurance: Pays lump sum on death
        - Critical Illness: Pays lump sum on diagnosis of specified illness
        - Income Protection: Replaces income if unable to work (long-term)
        - ASU: Short-term cover for accident, sickness, unemployment
        - PMI: Private medical treatment costs
  
        **Trust Benefits:**
        - Estate planning: Removes policy proceeds from estate for IHT
        - Speed of payout: Avoids probate delays
        - Flexibility: Can specify beneficiaries
  
    # Collection
    ProtectionCollection:
      type: object
      properties:
        href:
          type: string
          format: uri
          example: "/api/v2/factfinds/123/protections"
        items:
          type: array
          items:
            $ref: '#/components/schemas/Protection'
        count:
          type: integer
          description: Total number of protection policies
        totalCoverAmount:
          $ref: '#/components/schemas/MoneyValue'
          description: Total cover across all policies
        totalAnnualPremiums:
          $ref: '#/components/schemas/MoneyValue'
          description: Total annual premiums across all policies

