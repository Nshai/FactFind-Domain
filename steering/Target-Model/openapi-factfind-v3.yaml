              example: true
            healthAndWelfare:
              type: boolean
              description: Health and welfare LPA in place
              example: false
            attorneys:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  relationship:
                    type: string
        trustArrangements:
          type: object
          description: Trust arrangements
          properties:
            hasTrusts:
              type: boolean
              example: false
