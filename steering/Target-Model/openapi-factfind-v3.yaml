        href:
          type: string
          format: uri
          readOnly: true
          description: API link to this liability
        factfind:
          $ref: '#/components/schemas/ReferenceLink'
        owner:
          $ref: '#/components/schemas/LiabilityOwner'
        description:
          type: string
          maxLength: 500
          description: Liability description
        liabilityCategory:
          $ref: '#/components/schemas/LiabilityCategoryEnum'
        lender:
          type: string
          maxLength: 200
          description: Lender or creditor name
        liabilityAccountNumber:
          type: string
          maxLength: 100
          description: Account or reference number
        originalLoanAmount:
