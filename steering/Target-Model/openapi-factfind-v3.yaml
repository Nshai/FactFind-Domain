        employmentStatus:
          $ref: '#/components/schemas/EmploymentStatusEnum'
        smokingStatus:
          $ref: '#/components/schemas/SmokingStatusEnum'
        isDeceased:
          type: boolean
          description: Whether the client has passed away
          example: false
        deceasedDate:
          type: string
          nullable: true
          format: date
          description: Date of death (if applicable)
        healthMetrics:
          $ref: '#/components/schemas/HealthMetrics'

    HealthMetrics:
      type: object
      description: Height, weight, BMI for health and insurance assessment
      properties:
        heightCm:
          type: number
          format: double
          description: Height in centimeters
          example: 178.0
        weightKg:
          type: number
          format: double
          description: Weight in kilograms
          example: 82.5
        bmi:
          type: number
          format: double
          description: Body Mass Index (calculated)
