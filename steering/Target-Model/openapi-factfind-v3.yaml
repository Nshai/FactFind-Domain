  # ============================================================================
  # Net Worth API
  # ============================================================================
  /factfinds/{id}/net-worth:
    get:
      tags:
        - Net Worth
      summary: Get current net worth
      description: |
        Retrieves the current net worth calculation for a FactFind.

        **Business Rules:**
        - Calculates net worth as assets minus liabilities
        - Provides breakdown by asset and liability types
        - Includes liquidity analysis
        - Shows debt-to-asset ratio

        **Calculations:**
        - totalAssets: Sum of all asset currentValues
        - totalLiabilities: Sum of all liability amountOutstanding
        - netWorth: totalAssets - totalLiabilities
        - liquidAssets: Cash + easily liquidated investments
        - illiquidAssets: Property + difficult-to-sell assets
        - liquidityRatio: (liquidAssets / totalAssets) * 100
        - debtToAssetRatio: (totalLiabilities / totalAssets) * 100

        **Asset Breakdown:**
        - property: PROPERTY type assets
        - investments: INVESTMENT type assets
        - pensions: Pension assets (from Pension APIs)
        - business: BUSINESS type assets
        - cash: CASH type assets
        - other: OTHER type assets

        **Liability Breakdown:**
        - mortgages: MAIN_RESIDENCE, BUY_TO_LET, SECOND_HOME
        - loans: PERSONAL_LOAN, HP_LEASE, STUDENT_LOAN
        - creditCards: CREDIT_CARD
        - other: MAINTENANCE, OTHER

        **Use Cases:**
        - Display net worth dashboard
        - Financial health assessment
        - IHT estate planning
        - Wealth tracking over time
      operationId: getNetWorth
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetWorth'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  /factfinds/{id}/net-worth/calculate:
    post:
      tags:
        - Net Worth
      summary: Calculate and save net worth snapshot
      description: |
        Calculates current net worth and saves a snapshot for historical tracking.

        **Business Rules:**
        - Creates a new snapshot with current date/time
        - Calculates all net worth metrics
        - Compares to previous snapshot if exists (wealth progression)
        - Can include retirement gap analysis if target age provided

        **Wealth Progression:**
        - Compares to most recent previous snapshot
        - Calculates absolute change
        - Calculates percentage change
        - Calculates period in months

        **Retirement Gap:**
        - If targetRetirementAge provided, calculates:
          - Years to retirement
          - Required net worth for retirement
          - Shortfall (if any)
          - Monthly contribution needed to close gap

        **Use Cases:**
        - Create quarterly net worth snapshots
        - Track wealth progression
        - Annual review documentation
        - Retirement planning assessment
      operationId: calculateNetWorth
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                targetRetirementAge:
                  type: integer
                  minimum: 50
                  maximum: 80
                  description: Target retirement age for gap analysis
                requiredRetirementNetWorth:
                  $ref: '#/components/schemas/MoneyValue'
                notes:
                  type: string
                  maxLength: 1000
            example:
              targetRetirementAge: 65
              requiredRetirementNetWorth:
                amount: 1000000.00
                currency:
                  code: GBP
              notes: Q1 2026 net worth review
      responses:
        '201':
          description: Net worth snapshot created successfully
          headers:
            Location:
              description: URI of the created snapshot
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetWorthSnapshot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  /factfinds/{id}/net-worth/history:
    get:
      tags:
        - Net Worth
      summary: Get net worth history
      description: |
        Retrieves historical net worth snapshots for wealth progression analysis.

        **Business Rules:**
        - Returns all saved net worth snapshots
