        thirdPartyDisclosures:
          type: array
          description: Third parties to whom data may be disclosed
          items:
            type: object
            properties:
              name:
                type: string
                example: Product Provider Ltd
              purpose:
                type: string
                example: Product application
              category:
                type: string
                enum:
                  - ProductProvider
                  - ServiceProvider
                  - Regulator
                  - LegalAdvisor
                  - Other
        retentionPeriod:
          type: string
          maxLength: 200
          description: How long data will be retained
          example: 7 years from end of client relationship
        rightToWithdraw:
          type: boolean
          description: Whether client has right to withdraw consent
          example: true
        withdrawnDate:
          type: string
          nullable: true
          format: date-time
          description: Date consent was withdrawn (if applicable)
        withdrawnReason:
          type: string
          maxLength: 1000
          description: Reason for withdrawal (if applicable)
        isCurrent:
          type: boolean
          description: Whether this is the current active agreement
          readOnly: true
          example: true
        supersededBy:
          type: object
          description: Agreement that superseded this one (if applicable)
          readOnly: true
          properties:
            id:
              type: integer
              format: int64
            href:
              type: string
              format: uri
            agreementDate:
              type: string
              format: date-time
        notes:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    DPAAgreementCollection:
      allOf:
        - $ref: '#/components/schemas/CollectionResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/DPAAgreement'

    BankAccount:
      type: object
      required:
        - id
        - href
        - client
        - factfind
        - accountName
        - sortCode
        - accountNumber
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 2341
        href:
          type: string
          format: uri
          readOnly: true
          example: /api/v3/factfinds/679/clients/8496/bankaccounts/2341
        client:
          $ref: '#/components/schemas/ClientReference'
        factfind:
          type: object
          readOnly: true
          properties:
            id:
              type: integer
              format: int64
            factFindNumber:
              type: string
            status:
              type: string
        accountName:
          type: string
          maxLength: 200
          description: Name on the account
          example: Mr J Smith
        bankName:
          type: string
          maxLength: 200
          description: Name of bank or building society
          example: Lloyds Bank
        sortCode:
          type: string
          pattern: '^\d{2}-\d{2}-\d{2}$'
          description: UK bank sort code (format XX-XX-XX)
          example: 12-34-56
        accountNumber:
          type: string
          pattern: '^\d{8}$'
          description: UK bank account number (8 digits)
          example: 12345678
        iban:
          type: string
          maxLength: 34
          description: International Bank Account Number (for international transfers)
          example: GB29NWBK60161331926819
        bic:
          type: string
          maxLength: 11
          description: Bank Identifier Code / SWIFT code
          example: NWBKGB2L
        accountType:
          type: string
          enum:
            - Current
            - Savings
            - ISA
            - Business
            - Joint
            - Other
          description: Type of bank account
          example: Current
        isPreferredAccount:
          type: boolean
          description: Whether this is the preferred account for transactions
          example: true
        isPrimaryAccount:
          type: boolean
          description: Whether this is the client's primary bank account
          example: true
        isJointAccount:
          type: boolean
          description: Whether this is a joint account
          example: false
        jointAccountHolders:
          type: array
          description: Other account holders (if joint account)
          items:
            type: object
            properties:
              name:
                type: string
                example: Sarah Smith
              relationship:
                type: string
                example: Spouse
        currentBalance:
          $ref: '#/components/schemas/MoneyValue'
        balanceDate:
          type: string
          format: date
          description: Date of balance
          example: '2026-02-28'
        notes:
          type: string
          maxLength: 1000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    BankAccountCollection:
      allOf:
        - $ref: '#/components/schemas/CollectionResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/BankAccount'


# API Paths
paths:
  /factfinds:
    get:
      tags:
        - FactFind Root
      summary: List all FactFinds
      description: |
        Retrieves list of FactFinds with optional filtering and pagination.

        Supports QueryLang filtering to find FactFinds by client ID or other criteria.

        **Business Rules:**
        - Returns FactFinds the authenticated user has access to
        - Tenant isolation enforced
        - Client names populated from Client API
      operationId: listFactFinds
      parameters:
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Successful response with FactFind collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactFindCollection'
              example:
                href: /api/v3/factfinds?$top=25&$skip=0
                first_href: /api/v3/factfinds?$top=25&$skip=0
                last_href: /api/v3/factfinds?$top=25&$skip=0
                next_href: null
                prev_href: null
                items:
                  - id: 679
                    href: /api/v3/factfinds/679
                    clients:
                      - id: 123
                        href: /api/v3/factfinds/679/clients/123
                        name: John Smith
                    meeting:
                      meetingOn: '2026-03-05'
                      meetingType: FaceToFace
                      clientsPresent:
                        - id: 123
                          href: /api/v3/factfinds/679/clients/123
                          name: John Smith
                      anyOtherAudience: false
                      notes: Initial consultation.
                    disclosureKeyfacts:
                      - Type: CombinedInitialDisclosureDocument
                        IssuedOn: '2026-03-05'
                count: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

    post:
      tags:
        - FactFind Root
      summary: Create new FactFind
      description: |
        Creates a new FactFind record.

        **Business Rules:**
        - Must include at least one client ID
        - Client names are populated automatically from Client API
        - Meeting details are optional but recommended for FCA compliance
        - Disclosure keyfacts track regulatory documents issued
        - Client IDs must exist in the system

        **FCA Compliance:**
        - Combined Initial Disclosure Document (CIDD) should be issued before advice
        - Terms of Business (TOB) establishes client relationship
        - Recording consent required if meetingType includes "Recorded"
      operationId: createFactFind
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactFind'
            example:
              clients:
                - id: 123
                - id: 124
              meeting:
                meetingOn: '2026-03-05'
                meetingType: FaceToFace
                clientsPresent:
                  - id: 123
                  - id: 124
                anyOtherAudience: false
                notes: Initial consultation to discuss retirement planning and mortgage options.
              disclosureKeyfacts:
                - Type: CombinedInitialDisclosureDocument
                  IssuedOn: '2026-03-05'
                - Type: TermsOfBusiness
                  IssuedOn: '2026-03-05'
      responses:
        '201':
          description: FactFind created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactFind'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}:
    get:
      tags:
        - FactFind Root
      summary: Get FactFind by ID
      description: |
        Retrieves a specific FactFind by ID.

        Returns complete FactFind object including clients, meeting details, and disclosure keyfacts.
      operationId: getFactFind
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactFind'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

    put:
      tags:
        - FactFind Root
      summary: Update FactFind
      description: |
        Updates an existing FactFind record.

        **Business Rules:**
        - Client IDs can be updated but names cannot (read-only)
        - Meeting details can be modified
        - Disclosure keyfacts array can be appended
        - Must include at least one client

        **Concurrency:**
        - Returns 409 Conflict if resource modified by another user
        - Use optimistic concurrency if required by implementation
      operationId: updateFactFind
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactFind'
      responses:
        '200':
          description: FactFind updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactFind'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
      security:
        - OAuth2:
            - factfind

  # Control Options API
  /factfinds/{id}/controloptions:
    get:
      tags:
        - Control Options
      summary: Get Control Options
      description: |
        Retrieves the complete control options singleton for a FactFind.

        Returns all six sections (investments, pensions, mortgages, protections, assets, liabilities) combined.

        **Purpose:**
        - Section gating - show/hide FactFind sections based on client circumstances
        - Improve UX by reducing irrelevant questions
        - Focus data gathering on client's actual situation

        **Returns 404 if:**
        - Control options not yet created (no PUT operations performed)
      operationId: getControlOptions
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
              example:
                href: /api/v3/factfinds/679/controloptions
                factfind:
                  id: 679
                  href: /api/v3/factfinds/679
                investments:
                  hasCash: true
                  hasInvestments: true
                pensions:
                  hasEmployerPensionSchemes: true
                  hasFinalSalary: false
                  hasMoneyPurchases: true
                  hasPersonalPensions: true
                  hasAnnuities: false
                mortgages:
                  hasMortgages: true
                  hasEquityRelease: false
                protections:
                  hasProtection: true
                assets:
                  hasAssets: true
                liabilities:
                  hasLiabilities: true
                  reductionOfLiabilities:
                    isExpected: false
                    nonReductionReason: RetainControlOfCapital
                    details: Client prefers to maintain liquidity for flexibility and investment opportunities.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}/controloptions/assets:
    put:
      tags:
        - Control Options
      summary: Update Assets Control Options
      description: |
        Creates or updates the assets section of control options.

        **Business Rules:**
        - First PUT to any section creates the singleton
        - Subsequent PUTs update individual sections
        - All PUT operations return complete ControlOptions object
        - Section updates are independent
        - FactFind reference is immutable

        **Behavior:**
        - Returns 201 Created on first PUT to any section
        - Returns 200 OK on subsequent updates
      operationId: updateControlOptionsAssets
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetsControl'
            example:
              hasAssets: true
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '201':
          description: Section created (first PUT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}/controloptions/liabilities:
    put:
      tags:
        - Control Options
      summary: Update Liabilities Control Options
      description: |
        Creates or updates the liabilities section of control options.

        **Validation Rules:**
        - nonReductionReason must be valid enum value
        - details field maximum 1000 characters
        - If isExpected is false, nonReductionReason should be provided

        **Use Cases:**
        - Track whether client plans to reduce debts
        - Document debt strategy (retain capital, pension planning, other)
        - Support liability reduction planning discussions
      operationId: updateControlOptionsLiabilities
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiabilitiesControl'
            example:
              hasLiabilities: true
              reductionOfLiabilities:
                isExpected: false
                nonReductionReason: RetainControlOfCapital
                details: Client prefers to maintain liquidity for flexibility and investment opportunities.
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '201':
          description: Section created (first PUT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/parameters/FactFindId'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}/controloptions/investments:
    put:
      tags:
        - Control Options
      summary: Update Investments Control Options
      description: |
        Creates or updates the investments section of control options.

        **Purpose:**
        - hasCash: Bank accounts, savings accounts, cash ISAs
        - hasInvestments: Stocks, shares, investment ISAs, bonds, funds
        - Both can be true (client has both cash and investments)
        - Both can be false (client has neither)
      operationId: updateControlOptionsInvestments
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvestmentsControl'
            example:
              hasCash: true
              hasInvestments: true
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '201':
          description: Section created (first PUT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}/controloptions/pensions:
    put:
      tags:
        - Control Options
      summary: Update Pensions Control Options
      description: |
        Creates or updates the pensions section of control options.

        **Pension Types:**
        - hasEmployerPensionSchemes: Workplace pensions, auto-enrolment
        - hasFinalSalary: Defined benefit with guaranteed income
        - hasMoneyPurchases: Defined contribution with investment risk
        - hasPersonalPensions: SIPPs, stakeholder, personal pensions
        - hasAnnuities: Guaranteed income for life products

        **Multiple Flags:**
        - Multiple pension flags can be true simultaneously
        - Enables precise section gating for different pension types
      operationId: updateControlOptionsPensions
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PensionsControl'
            example:
              hasEmployerPensionSchemes: true
              hasFinalSalary: false
              hasMoneyPurchases: true
              hasPersonalPensions: true
              hasAnnuities: false
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '201':
          description: Section created (first PUT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}/controloptions/protections:
    put:
      tags:
        - Control Options
      summary: Update Protections Control Options
      description: |
        Creates or updates the protections section of control options.

        **Protection Products:**
        - Life insurance (term, whole of life)
        - Critical illness cover
        - Income protection insurance
        - Expense cover
        - Severity cover
      operationId: updateControlOptionsProtections
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProtectionsControl'
            example:
              hasProtection: true
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '201':
          description: Section created (first PUT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}/controloptions/mortgages:
    put:
      tags:
        - Control Options
      summary: Update Mortgages Control Options
      description: |
        Creates or updates the mortgages section of control options.

        **Mortgage Types:**
        - hasMortgages: Residential mortgages, buy-to-let, second charges
        - hasEquityRelease: Lifetime mortgages, home reversion plans

        **Purpose:**
        - Show mortgage section only if client has mortgages
        - Show equity release section only if client has equity release products
        - Both can be true (client has both types)
      operationId: updateControlOptionsMortgages
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MortgagesControl'
            example:
              hasMortgages: true
              hasEquityRelease: false
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '201':
          description: Section created (first PUT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind
  # Client Management API
  /factfinds/{id}/clients:
    get:
      tags:
        - Client Management
      summary: List clients for a FactFind
      description: |
        Retrieves list of clients associated with a FactFind.

        **Business Rules:**
        - Returns all clients for the specified FactFind
        - Client names populated from personValue
        - Supports filtering and ordering
        - Pagination available for large client lists

        **Use Cases:**
        - Display client list in UI
        - Filter clients by service status
        - Search for clients by name
      operationId: listClients
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Successful response with client collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2:
            - factfind

    post:
      tags:
        - Client Management
      summary: Add client to FactFind
      description: |
        Creates a new client record and associates with FactFind.

        **Business Rules:**
        - clientType required (Person, Corporate, Trust)
        - If clientType=Person, personValue is required
        - firstName, lastName, dateOfBirth required for Person
        - fullName and age calculated automatically
        - BMI calculated from height and weight

        **Validation:**
        - NI Number must match UK format (if provided)
        - Date of birth must be in past
        - Client segment must be A, B, C, or D
      operationId: createClient
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
            example:
              clientType: Person
              serviceStatus: Active
              personValue:
                title: MR
                firstName: John
                lastName: Smith
                dateOfBirth: '1980-05-15'
                gender: Male
                niNumber: AB123456C
                occupation: Software Engineer
                employmentStatus: Employed
      responses:
        '201':
          description: Client created successfully
          headers:
            Location:
              schema:
                type: string
              description: URI of the created client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

  /factfinds/{id}/clients/{clientId}:
    get:
      tags:
        - Client Management
      summary: Get client by ID
      description: |
        Retrieves a specific client by ID.

        Returns complete client record including person value and territorial profile.
      operationId: getClient
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

    patch:
      tags:
        - Client Management
      summary: Update client (partial update)
      description: |
        Partially updates an existing client record.

        **Business Rules:**
        - Only provided fields are updated
        - Read-only fields ignored (id, href, fullName, age, bmi)
        - Can update client details, service status, relationships
        - Cannot change clientType after creation

        **Validation:**
        - Same validation as POST applies to updated fields
      operationId: updateClient
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
            example:
              serviceStatus: Inactive
              serviceStatusDate: '2026-03-05'
      responses:
        '200':
          description: Client updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
      security:
        - OAuth2:
            - factfind

    delete:
      tags:
        - Client Management
      summary: Remove client from FactFind
      description: |
        Removes a client from the FactFind.

        **Warning:** This is a cascading delete operation.

        **Cascade Behavior:**
        - Deletes all addresses for this client
        - Deletes all contacts for this client
        - Deletes all professional contacts
        - Deletes all relationships
        - Deletes all dependants
        - Deletes all vulnerabilities
        - Deletes estate planning data
        - Deletes all employment records
        - Deletes all income records
        - Deletes all expenditure records

        **Business Rules:**
        - FactFind must have at least one client (cannot delete last client)
        - Returns 400 if attempting to delete last client
      operationId: deleteClient
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      responses:
        '204':
          description: Client deleted successfully
        '400':
          description: Cannot delete last client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CANNOT_DELETE_LAST_CLIENT
                  message: Cannot delete the last client from a FactFind
                  details:
                    - field: clientId
                      issue: FactFind must have at least one client
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - OAuth2:
            - factfind

