        - Supports pagination via $top and $skip parameters
        - Can be filtered by category, isEssential, isDiscretionary, isConsolidated
        - Can be sorted using orderBy parameter

        **Expenditure Categories:**
        - **Essential:** Mortgage, Rent, Council Tax, Gas, Electricity, Water, Food, Transport
        - **Quality of Living:** Clothing, Furniture, TV/Internet, Pension Contributions, Childcare
        - **Non-Essential:** Sports, Holidays, Entertainment, Investments, Credit Card payments

        **Use Cases:**
        - Display complete expenditure breakdown
        - Calculate total committed expenditure
        - Assess affordability for lending
        - Identify discretionary spending for budget planning
        - Track debt consolidation scenarios
