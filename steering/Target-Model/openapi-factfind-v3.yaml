  # ============================================================================
  # MORTGAGE API (5 operations)
  # ============================================================================

  /factfinds/{id}/mortgages:
    get:
      tags:
        - Mortgage
      summary: List mortgages for a FactFind
      description: |
        Retrieves all mortgage arrangements including residential, buy-to-let, and equity release mortgages.

        **Mortgage Types:**
        - **RESIDENTIAL:** Main residence mortgage
        - **BUY_TO_LET:** Investment property mortgage with rental income
        - **EQUITY_RELEASE:** Lifetime mortgage (no monthly payments, interest rolls up)
        - **SECOND_HOME:** Holiday or second home mortgage
        - **COMMERCIAL:** Commercial property mortgage

        **FCA MCOB Requirements:**
        - Affordability assessment required for new mortgages
        - Interest rate stress testing at +3% or reversion rate
        - Repayment strategy required for interest-only mortgages
        - Equity release subject to Equity Release Council standards

        **Remortgaging:**
        - Product transfer to new deal with same lender
        - Remortgage to different lender
        - Consider early repayment charges (ERCs)
        - Rate expiry typically triggers review
      operationId: listMortgages
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/OrderBy'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MortgageCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    post:
      tags:
        - Mortgage
      summary: Add a mortgage
      description: |
        Creates a new mortgage record.

        **Interest Rate Types:**
        - **FIXED:** Fixed rate for 2, 3, 5, 10 years (provides certainty)
        - **VARIABLE:** Lender's standard variable rate (can change any time)
        - **TRACKER:** Tracks Bank of England base rate + margin (transparent)
        - **DISCOUNT:** Discount from lender's SVR for fixed period
        - **CAPPED:** Maximum rate ceiling (downside protection)

        **Repayment Methods:**
        - **REPAYMENT:** Capital and interest paid monthly (full repayment at end)
        - **INTEREST_ONLY:** Only interest paid, capital due at end (requires repayment vehicle)
        - **PART_AND_PART:** Combination of both methods

        **Interest-Only Repayment Vehicles:**
        - Investment ISAs or GIAs
        - Pension lump sum
        - Endowment policies (legacy)
        - Sale of property
        - Inheritance expectation

        **FCA Requirements:**
        - Must evidence repayment strategy for interest-only
        - Regular reviews of repayment vehicle performance
        - Stress testing at higher interest rates
      operationId: createMortgage
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Mortgage'
      responses:
        '201':
          description: Mortgage created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mortgage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  /factfinds/{id}/mortgages/{mortgageId}:
    get:
      tags:
        - Mortgage
      summary: Get mortgage details
      description: |
        Retrieves detailed information for a specific mortgage.

        **Key Mortgage Metrics:**
        - **LTV (Loan-to-Value):** (Outstanding / Property Value) × 100
        - **Monthly Payment:** Principal + Interest payment
        - **Term Remaining:** Months until mortgage matures
        - **Interest Rate:** Current rate and type

        **Mortgage Review Triggers:**
        - Fixed rate ending (typically 3-6 months before)
