  # ============================================================================
  # Employment Summary API (Singleton)
  # ============================================================================
  /factfinds/{id}/clients/{clientId}/employments/summary:
    get:
      tags:
        - Employment Summary
      summary: Get employment summary
      description: |
        Retrieves the employment summary for a client (singleton resource).

        **Business Rules:**
        - Singleton resource (one per client)
        - Returns 404 if no summary exists yet
        - totalGrossAnnualIncome is calculated from all income sources
        - Includes highest marginal tax rate

        **Calculation Logic:**
        - totalGrossAnnualIncome automatically aggregates all income
        - Includes employment, self-employment, rental, investment, pension, other
        - Annualized based on income frequency
        - Updated automatically when income records change

        **Use Cases:**
        - Display income overview
        - Calculate affordability ratios
        - Tax planning
        - Mortgage application income verification
      operationId: getEmploymentSummary
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmploymentSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No employment summary exists for this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - OAuth2: [factfind]

    put:
      tags:
        - Employment Summary
      summary: Create or update employment summary
      description: |
        Creates or updates the employment summary for a client.

        **Business Rules:**
        - Singleton resource (one per client)
        - Creates if doesn't exist, updates if exists
        - totalGrossAnnualIncome is read-only (calculated)
        - Only highestTaxRatePaid can be manually set

        **Tax Rates (UK & Scottish):**
        - 0%: No taxable income or within personal allowance
        - 19-22%: Basic/starter rates
        - 40-42%: Higher rates
        - 45-48%: Additional/top rates

        **Validation:**
        - highestTaxRatePaid.percentage must be from approved list
        - Cannot manually set totalGrossAnnualIncome

        **Use Cases:**
        - Set client's highest tax rate
        - Trigger recalculation of income summary
        - Update tax planning information
      operationId: createOrUpdateEmploymentSummary
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmploymentSummary'
            example:
              highestTaxRatePaid:
                percentage: 40
      responses:
        '200':
          description: Employment summary updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmploymentSummary'
        '201':
          description: Employment summary created successfully
          headers:
            Location:
              description: URI of the created employment summary
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmploymentSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

  # ============================================================================
  # Income API
  # ============================================================================
  /factfinds/{id}/clients/{clientId}/income:
    get:
      tags:
        - Income
      summary: List income sources for a client
      description: |
        Retrieves all income sources for a client including employment, dividends, rental, pension, and benefits.

        **Business Rules:**
        - Returns all income sources with tax treatment
        - Supports pagination via $top and $skip parameters
        - Can be filtered by incomeType, isTaxable, isOngoing, isPrimary
        - Can be sorted using orderBy parameter

        **Income Types:**
        - Employment: Salary from PAYE employment
        - Dividend: Dividend income from shares
        - Rental: Rental income from properties
        - Pension: Pension income (state, private, employer)
        - Benefits: State benefits and tax credits
        - Other: Other income sources

        **Use Cases:**
        - Display complete income picture
        - Calculate total annual income
        - Assess mortgage affordability
        - Tax planning
      operationId: listIncome
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    post:
      tags:
        - Income
      summary: Add an income source
      description: |
        Creates a new income source record for a client.

        **Business Rules:**
        - incomeType, description, grossAmount, frequency, and isTaxable are required
        - System calculates annualAmount based on frequency
        - Only one income can be marked as primary
        - Employment income should link to employment record
        - Rental/dividend income should link to generating asset

        **Tax Treatment:**
        - Employment: Usually PAYE taxed
        - Dividend: Dividend tax rates apply (£500 allowance 2024/25)
        - Rental: Self-assessment, allowable expenses (£1,000 property allowance)
        - Pension: Usually taxed at source
        - Benefits: Some taxable, some not

        **Frequency Codes:**
        - A: Annually (1 per year)
        - M: Monthly (12 per year)
        - W: Weekly (52 per year)
        - F: Fortnightly (26 per year)
        - Q: Quarterly (4 per year)

        **FCA MCOB:**
        - All income sources must be verified
        - Self-employed income requires 2-3 years evidence
        - Bonus/commission may be averaged or excluded
        - Rental income treated at 125% coverage typically

        **Validation:**
        - grossAmount must be positive
        - netAmount cannot exceed grossAmount
        - If employment link provided, employment record must exist

        **Use Cases:**
        - Record employment salary
        - Add rental income from BTL property
        - Document pension income
        - Track dividend income from investments
      operationId: createIncome
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Income'
            example:
              incomeType: Employment
              description: Salary from Tech Corp Ltd
              grossAmount:
                amount: 75000.00
                currency:
                  code: GBP
              netAmount:
                amount: 55000.00
                currency:
                  code: GBP
              taxDeducted:
                amount: 15000.00
                currency:
                  code: GBP
              nationalInsuranceDeducted:
                amount: 5000.00
                currency:
                  code: GBP
              frequency:
                code: A
                display: Annually
                periodsPerYear: 1
              incomePeriod:
                startDate: '2020-01-15'
              isTaxable: true
              isGuaranteed: true
              isOngoing: true
              isPrimary: true
              employment:
                id: 8695
      responses:
        '201':
          description: Income source created successfully
          headers:
            Location:
              description: URI of the created income source
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Income'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

