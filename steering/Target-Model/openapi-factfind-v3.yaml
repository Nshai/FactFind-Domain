    EstatePlanning:
      type: object
      required:
        - href
        - client
        - factfind
      properties:
        href:
          type: string
          format: uri
          description: API link to this resource
          readOnly: true
          example: /api/v3/factfinds/679/clients/8496/estateplanning
        client:
          $ref: '#/components/schemas/ClientReference'
        factfind:
          type: object
          description: Reference to the fact find
          readOnly: true
          properties:
            id:
              type: integer
              format: int64
            factFindNumber:
              type: string
            status:
              type: string
        willInPlace:
          type: boolean
          description: Whether the client has a will in place
          example: true
        willLastUpdated:
          type: string
          format: date
          description: Date will was last updated
          example: '2020-06-15'
        executors:
          type: array
