              totalAssets:
                amount: 450000.00
                currency:
                  code: GBP
              totalLiabilities:
                amount: 180000.00
                currency:
                  code: GBP
              netWorth:
                amount: 270000.00
                currency:
                  code: GBP
              totalAnnualIncome:
                amount: 65000.00
                currency:
                  code: GBP
              totalAnnualExpenditure:
                amount: 42000.00
                currency:
                  code: GBP
              monthlySurplus:
                amount: 1916.67
                currency:
                  code: GBP
              liquidityRatio: 4.5
              emergencyFundMonths: 6
              debtToIncomeRatio: 0.28
              notes: Strong financial position with adequate emergency fund
      responses:
        '200':
          description: Financial profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialProfile'
        '201':
          description: Financial profile created successfully
          headers:
            Location:
