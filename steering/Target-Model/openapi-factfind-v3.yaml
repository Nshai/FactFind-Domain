          maxLength: 100
          description: First name (given name)
          example: John
        middleNames:
          type: string
          maxLength: 200
          description: Middle name(s)
          example: Michael Robert
        lastName:
          type: string
          maxLength: 100
          description: Last name (surname/family name)
          example: Smith
        fullName:
          type: string
          description: Complete formatted name including title
          readOnly: true
          example: Mr John Michael Robert Smith
        preferredName:
          type: string
          maxLength: 100
          description: Name the client prefers to be called
          example: John
        salutation:
          type: string
          maxLength: 100
          description: How to address the client
          example: Mr Smith
        dateOfBirth:
          type: string
          format: date
          description: Date of birth (ISO 8601 YYYY-MM-DD)
          example: '1980-05-15'
        age:
          type: integer
          description: Current age (calculated from date of birth)
          readOnly: true
          example: 45
        gender:
          $ref: '#/components/schemas/GenderEnum'
        maritalStatus:
          type: object
          description: Current marital status with effective date
          properties:
            code:
              $ref: '#/components/schemas/MaritalStatusEnum'
            effectiveFrom:
              type: string
              format: date
              description: Date marital status became effective
              example: '2005-06-20'
        niNumber:
          type: string
          pattern: '^[A-Z]{2}[0-9]{6}[A-D]$'
          description: National Insurance number (UK)
          example: AB123456C
        occupation:
          type: string
          maxLength: 200
          description: Current occupation/job title
          example: Senior Software Engineer
        occupationCode:
          type: object
          description: Standard Occupational Classification (SOC) code
          properties:
            code:
              type: string
              example: '2136'
            display:
              type: string
              example: Programmers and Software Development Professionals
            socVersion:
              type: string
