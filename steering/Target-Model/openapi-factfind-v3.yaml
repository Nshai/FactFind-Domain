  # ============================================================================
  /factfinds/{id}/pensions/employer:
    get:
      tags:
        - Employer Pension Scheme
      summary: List employer pension schemes
      description: |
        Retrieves all employer pension schemes (workplace pensions).

        **Workplace Pensions:**
        - Auto-enrolment for eligible employees
        - Minimum contributions: 8% total (5% employee, 3% employer)
        - Employee contributions get tax relief
        - Employer contributions tax-deductible and NI-free

        **Contribution Types:**
        - Relief at source: Tax relief added to pension (20%)
        - Net pay: Tax relief via reduced taxable income
        - Salary sacrifice: Reduces gross salary, saves NI

        **Annual Allowance (2024/25):**
        - Standard: £60,000
        - Tapered for high earners (income over £260,000)
        - Minimum tapered allowance: £10,000
        - Carry forward from previous 3 years available

        **Use Cases:**
        - Display workplace pension details
        - Calculate total pension contributions
        - Track employer matching
        - Assess retirement savings
      operationId: listEmployerPensionSchemes
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerPensionSchemeCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
