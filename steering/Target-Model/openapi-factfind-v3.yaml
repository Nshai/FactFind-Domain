  /factfinds/{id}/clients/{clientId}/income/changes:
    get:
      tags:
        - Income
      summary: List income changes for a client
      description: |
        Retrieves all anticipated income changes for planning and affordability assessment.

        **Business Rules:**
        - Returns all planned income changes (increases, decreases, cessations)
        - Ordered by effectiveDate ascending (soonest first)
        - Can be filtered by changeType, isConfirmed, effectiveDate
        - Supports pagination via $top and $skip parameters

        **Use Cases:**
        - Affordability modelling with future income changes
        - Retirement income planning
        - Career change scenario analysis
        - Mortgage affordability stress testing
      operationId: listIncomeChanges
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
        - name: $top
          in: query
          description: Number of items to return (default 25, max 100)
          schema:
            type: integer
            default: 25
            maximum: 100
        - name: $skip
          in: query
          description: Number of items to skip
          schema:
            type: integer
            default: 0
        - name: orderBy
          in: query
          description: Sort order (e.g., "effectiveDate asc")
          schema:
            type: string
        - name: filter
          in: query
          description: Filter expression (e.g., "changeType eq 'INCREASE'")
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
