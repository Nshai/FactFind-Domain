          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    NetWorth:
      type: object
      description: |
        Net worth calculation (assets minus liabilities) with asset/liability breakdown,
        wealth progression analysis, and retirement gap assessment.
      properties:
        href:
          type: string
          format: uri
          readOnly: true
          description: API link to this resource
        factfind:
          $ref: '#/components/schemas/ReferenceLink'
        calculatedOn:
          type: string
          format: date-time
          readOnly: true
          description: When net worth was calculated
        totalAssets:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Total value of all assets
        totalLiabilities:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Total value of all liabilities
        netWorth:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Assets minus liabilities
        assetBreakdown:
          $ref: '#/components/schemas/AssetBreakdown'
        liabilityBreakdown:
          $ref: '#/components/schemas/LiabilityBreakdown'
        liquidAssets:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Cash and easily liquidated assets
        illiquidAssets:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Property and difficult-to-sell assets
        liquidityRatio:
          type: number
          format: float
          readOnly: true
          description: Liquid assets as percentage of total assets
        debtToAssetRatio:
          type: number
          format: float
          readOnly: true
          description: Liabilities as percentage of assets
        wealthProgression:
          $ref: '#/components/schemas/WealthProgression'
        retirementGap:
          $ref: '#/components/schemas/RetirementGap'
        notes:
          type: string
          maxLength: 1000
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    NetWorthSnapshot:
      allOf:
        - $ref: '#/components/schemas/NetWorth'
        - type: object
          properties:
            id:
              type: integer
              readOnly: true
              description: Snapshot ID
            snapshotDate:
              type: string
              format: date
              description: Date of this snapshot

