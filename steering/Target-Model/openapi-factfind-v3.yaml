  # ============================================================================
  # PERSONAL PROTECTION API (5 operations)
  # ============================================================================

  /factfinds/{id}/protections:
    get:
      tags:
        - Personal Protection
      summary: List protection policies for a FactFind
      description: |
        Retrieves all protection insurance policies including life, critical illness, and income protection.

        **Protection Types:**
        - **Life Insurance:** Pays lump sum on death (level/decreasing/increasing term, whole of life)
        - **Critical Illness:** Pays lump sum on diagnosis of specified critical illness
        - **Life + Critical Illness:** Combined cover (accelerated or additional benefit)
        - **Income Protection:** Replaces income if unable to work due to illness/injury (long-term)
        - **ASU:** Accident, Sickness, Unemployment cover (short-term, typically 12 months)
        - **PMI:** Private Medical Insurance for private medical treatment
        - **Family Income Benefit:** Regular income payments on death (instead of lump sum)

        **Protection Needs Analysis:**
        - **Debt Protection:** Cover outstanding liabilities (mortgage, loans)
        - **Income Replacement:** 10-15× annual income or income until retirement
        - **Specific Goals:** Education funding, inheritance, business protection
        - **Existing Cover:** Employer benefits, existing policies

        **FCA/IDD Requirements:**
        - Demands and needs statement
        - Suitability report for advised sales
        - Product disclosure and IPID
        - Annual renewal notices
      operationId: listProtections
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/Top'
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/OrderBy'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtectionCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    post:
      tags:
        - Personal Protection
      summary: Add a protection policy
      description: |
        Creates a new protection policy record.

        **Life Cover Types:**
        - **Level Term:** Fixed sum assured (e.g., £300,000 for 25 years)
        - **Decreasing Term:** Reduces in line with mortgage (mortgage protection)
        - **Increasing Term:** Increases annually with inflation (RPI or fixed %)
        - **Whole of Life:** Cover for entire life (estate planning, IHT)
        - **Family Income Benefit:** Regular payments instead of lump sum (income replacement)

        **Underwriting Types:**
        - **Full Underwriting:** Medical questionnaire, GP report, medicals (best rates)
        - **Moratorium:** Pre-existing conditions excluded for 2-5 years then covered
        - **CPME:** Specific medical exclusions listed (Continued Personal Medical Exclusions)
        - **Guaranteed Acceptance:** No medical questions (limited cover, higher premiums)

        **Trust Planning:**
        - **In Trust:** Proceeds paid outside estate (avoids probate, IHT efficient)
        - **Absolute Trust:** Named beneficiaries, irrevocable
        - **Discretionary Trust:** Trustees decide distribution (flexibility)
        - **Bare Trust:** For minor children

        **Income Protection:**
        - **Deferred Period:** 4, 13, 26, 52 weeks before payments start (longer = cheaper)
        - **Benefit Period:** To age 65, 70, or 2-5 years (to retirement = best)
        - **Benefit Amount:** Typically 50-70% of gross income (tax-free)
        - **Definition of Incapacity:** Own occupation vs any occupation
      operationId: createProtection
      parameters:
        - $ref: '#/components/parameters/FactFindId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Protection'
      responses:
        '201':
          description: Protection policy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Protection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

