  # ============================================================================
  # Phase 4: Assets & Liabilities Context - Schemas
  # ===========================================================================

    # ===========================================================================
    # Enumerations
    # ===========================================================================

    AssetTypeEnum:
      type: string
      enum:
        - PROPERTY
        - BUSINESS
        - CASH
        - INVESTMENT
        - OTHER
      description: Type of asset

    OwnershipTypeEnum:
      type: string
      enum:
        - SOLE
        - JOINT
        - TRUST
      description: Asset ownership type

    JointOwnershipTypeEnum:
      type: string
      enum:
        - JOINT_TENANTS
        - TENANTS_IN_COMMON
      description: |
        Type of joint ownership:
        - JOINT_TENANTS: Both own 100%, passes to survivor on death
        - TENANTS_IN_COMMON: Own specific percentages, can be left in will

    RNRBEligibilityEnum:
      type: string
      enum:
        - Eligible
        - NotEligible
        - Unknown
      description: |
        Residence Nil Rate Band eligibility:
        - Eligible: Main residence passing to direct descendants (up to £175,000 additional relief)
        - NotEligible: Does not qualify
        - Unknown: Eligibility not yet determined

    LiabilityCategoryEnum:
      type: string
      enum:
        - MAIN_RESIDENCE
        - BUY_TO_LET
        - SECOND_HOME
        - PERSONAL_LOAN
        - CREDIT_CARD
        - HP_LEASE
        - STUDENT_LOAN
        - MAINTENANCE
        - OTHER
      description: Category of liability/debt

    RateTypeEnum:
      type: string
      enum:
        - FIXED
        - VARIABLE
        - TRACKER
      description: |
        Interest rate type:
        - FIXED: Fixed interest rate for specified period
        - VARIABLE: Variable interest rate
        - TRACKER: Tracker rate (follows base rate)

    RepaymentMethodEnum:
      type: string
      enum:
        - REPAYMENT
        - INTEREST_ONLY
        - PART_AND_PART
      description: |
        Loan repayment method:
        - REPAYMENT: Capital and interest (repayment)
        - INTEREST_ONLY: Interest-only payments
        - PART_AND_PART: Part repayment, part interest-only

    ProtectionTypeEnum:
      type: string
      enum:
        - NOT_PROTECTED
        - LIFE
        - CIC
        - LIFE_AND_CIC
      description: |
        Protection coverage for liability:
        - NOT_PROTECTED: No protection cover
        - LIFE: Life insurance only
        - CIC: Critical illness cover only
        - LIFE_AND_CIC: Life and critical illness cover

    PropertyTypeEnum:
      type: string
      enum:
        - DETACHED
        - SEMI_DETACHED
        - TERRACED
        - BUNGALOW
        - FLAT
        - MAISONETTE
        - OTHER
      description: Type of property

    # ===========================================================================
    # Value Types and Supporting Objects
    # ===========================================================================

    Ownership:
      type: object
      description: Asset ownership details
      properties:
        ownershipType:
          $ref: '#/components/schemas/OwnershipTypeEnum'
        jointOwnershipType:
          $ref: '#/components/schemas/JointOwnershipTypeEnum'
        ownershipPercentage:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Percentage owned by this client
          example: 50.0
        owners:
          type: array
          description: List of all owners
          items:
            type: object
            properties:
              clientId:
                type: integer
                description: Client ID
              clientName:
                type: string
                description: Client name
              percentage:
                type: number
                format: float
                description: Ownership percentage

    PropertyDetails:
      type: object
      description: Detailed property information (sub-resource for PROPERTY assets)
      properties:
        id:
          type: integer
          readOnly: true
          description: Property details ID
        propertyType:
          $ref: '#/components/schemas/PropertyTypeEnum'
        numberOfBedrooms:
          type: integer
          minimum: 0
          description: Number of bedrooms
        numberOfBathrooms:
          type: integer
          minimum: 0
          description: Number of bathrooms
        constructionYear:
          type: integer
          description: Year property was built
        floorArea:
          type: number
          format: float
          description: Floor area in square meters
        address:
          $ref: '#/components/schemas/Address'
        isMainResidence:
          type: boolean
          description: Whether this is the client's main residence
        isBuyToLet:
          type: boolean
          description: Whether this is a buy-to-let property
        tenancyStatus:
          type: string
          enum:
            - OwnerOccupied
            - Tenanted
            - Vacant
          description: Current tenancy status
        rentalIncome:
          $ref: '#/components/schemas/MoneyValue'
        estimatedRentalYield:
          type: number
          format: float
          description: Annual rental yield percentage

    LiabilityOwner:
      type: object
      required:
        - client
      description: Owner of a liability
      properties:
        client:
          type: object
          required:
            - id
          properties:
            id:
              type: integer
            href:
              type: string
              format: uri
            name:
              type: string

    AssetBreakdown:
      type: object
      description: Breakdown of assets by type
      properties:
        property:
          $ref: '#/components/schemas/MoneyValue'
        investments:
          $ref: '#/components/schemas/MoneyValue'
        pensions:
          $ref: '#/components/schemas/MoneyValue'
        business:
          $ref: '#/components/schemas/MoneyValue'
        cash:
          $ref: '#/components/schemas/MoneyValue'
        other:
          $ref: '#/components/schemas/MoneyValue'

    LiabilityBreakdown:
      type: object
      description: Breakdown of liabilities by type
      properties:
        mortgages:
          $ref: '#/components/schemas/MoneyValue'
        loans:
          $ref: '#/components/schemas/MoneyValue'
        creditCards:
          $ref: '#/components/schemas/MoneyValue'
        other:
          $ref: '#/components/schemas/MoneyValue'

    WealthProgression:
      type: object
      description: Wealth change compared to previous snapshot
      properties:
        previousNetWorth:
          $ref: '#/components/schemas/MoneyValue'
        change:
          $ref: '#/components/schemas/MoneyValue'
        changePercentage:
          type: number
          format: float
          description: Percentage change in net worth
        periodMonths:
          type: integer
          description: Months since last snapshot

    RetirementGap:
      type: object
      description: Retirement planning gap analysis
      properties:
        targetRetirementAge:
          type: integer
          minimum: 50
          maximum: 80
          description: Target retirement age
        currentAge:
          type: integer
          readOnly: true
          description: Current age (calculated)
        yearsToRetirement:
          type: integer
          readOnly: true
          description: Years until retirement (calculated)
        requiredNetWorth:
          $ref: '#/components/schemas/MoneyValue'
        currentNetWorth:
          $ref: '#/components/schemas/MoneyValue'
        shortfall:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Retirement shortfall (calculated)
        monthlyContributionRequired:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          readOnly: true
          description: Monthly savings needed to close gap

