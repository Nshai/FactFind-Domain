      security:
        - OAuth2: [factfind]

  /reference/offices/{officeId}:
    get:
      tags:
        - Reference Data
      summary: Get office details
      description: Retrieves detailed information for a specific office.
      operationId: getOffice
      parameters:
        - $ref: '#/components/parameters/OfficeId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Office'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    patch:
      tags:
        - Reference Data
      summary: Update office
      description: |
        Updates office details. Supports partial updates.

        Common updates:
        - Address changes
        - Contact information
        - Active status
      operationId: updateOffice
      parameters:
        - $ref: '#/components/parameters/OfficeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Office'
      responses:
