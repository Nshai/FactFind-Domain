        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

    delete:
      tags:
        - Vulnerability
      summary: Delete a vulnerability
      description: |
        Permanently deletes a vulnerability record.

        **Business Rules:**
        - Hard delete (permanent removal)
        - Should only be used for erroneous entries
        - Prefer marking as resolved (isActive = false) for audit trail
        - Cannot be undone

