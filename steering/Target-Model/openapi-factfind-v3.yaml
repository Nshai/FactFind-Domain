    post:
      tags:
        - Expenditure
      summary: Add an expenditure item
      description: |
        Creates a new expenditure record for a client.

        **Business Rules:**
        - category, description, amount, and frequency are required
        - System calculates annualAmount based on frequency
        - System automatically classifies isEssential and isDiscretionary based on category
        - Debt payments should link to liability record

        **Essential Classification:**
        - Automatically determined from category
        - Essential: Always included in affordability
        - Quality of Living: Typically included
        - Non-Essential: May be excluded in stress tests

        **Frequency Codes:**
        - A: Annually (1 per year)
        - M: Monthly (12 per year)
        - W: Weekly (52 per year)
        - F: Fortnightly (26 per year)
        - Q: Quarterly (4 per year)

        **FCA MCOB 11 (Responsible Lending):**
        - Thorough expenditure assessment required
        - Must verify actual expenditure (bank statements)
        - Cannot exclude essential expenditure in affordability
        - Stress testing must include essential costs

        **Consumer Duty:**
        - Fair treatment requires realistic expenditure assessment
        - Cannot pressure clients to understate expenditure
        - Must consider actual living costs

        **Validation:**
        - amount must be positive
        - If liability link provided, liability must exist
        - endDate must be after startDate if provided

        **Use Cases:**
        - Record mortgage payment
        - Track utility bills
        - Document loan repayments
        - Record discretionary spending
