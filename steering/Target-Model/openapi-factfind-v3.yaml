  # ============================================================================
  # Identity Verification API (Singleton)
  # ============================================================================
  /factfinds/{id}/clients/{clientId}/identityverification:
    get:
      tags:
        - Identity Verification
      summary: Get identity verification details
      description: |
        Retrieves the identity verification record for a client (MLR 2017 compliance).

        **Business Rules:**
        - Singleton resource (one record per client)
        - Returns 404 if no verification record exists yet
        - Contains KYC/AML verification details
        - Documents satisfaction of MLR 2017 requirements

        **MLR 2017 Compliance:**
        - Customer Due Diligence (CDD) requirements
        - Proof of identity verification
        - Proof of address verification
        - PEP (Politically Exposed Person) screening
        - Sanctions screening
        - Source of funds/wealth documentation

        **Use Cases:**
        - Display KYC status
        - Evidence regulatory compliance
        - Track verification document expiry
        - Review PEP and sanctions screening
      operationId: getIdentityVerification
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityVerification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No identity verification record exists for this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - OAuth2: [factfind]

    put:
      tags:
        - Identity Verification
      summary: Create or update identity verification
      description: |
        Creates or updates the identity verification record for a client.

        **Business Rules:**
        - Singleton resource (one record per client)
        - Creates if doesn't exist, updates if exists
        - Full replacement of resource (all fields must be provided)
        - All verification checks must be completed for compliance
        - Document types and numbers must be recorded

        **MLR 2017 Compliance:**
        - Identity verification method required (e.g., Electronic, Documentary)
        - Identity document details required (type, number, expiry)
        - Address verification required (utility bill, bank statement, etc.)
        - PEP screening result required (Yes/No/Unknown)
        - Sanctions screening result required (Clear/Match/Unknown)
        - Verification date required
        - Verifier name required

        **Validation:**
        - verificationDate cannot be in future
        - identityDocumentExpiryDate must be after verificationDate
        - addressDocumentDate must be within last 3 months for most document types
        - All screening results must be from enum values

        **Use Cases:**
        - Complete initial KYC process
        - Update verification when documents renewed
        - Re-verify client after specified period
        - Update PEP or sanctions screening results
      operationId: createOrUpdateIdentityVerification
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityVerification'
            example:
              verificationMethod: Electronic
              verificationDate: '2026-02-10'
              verifiedBy: John Smith
              identityDocumentType: Passport
              identityDocumentNumber: '123456789'
              identityDocumentExpiryDate: '2030-06-15'
              identityDocumentIssuingCountry: GB
              addressVerificationMethod: BankStatement
              addressDocumentDate: '2026-01-31'
              isPEP: false
              pepScreeningDate: '2026-02-10'
              sanctionsScreeningResult: Clear
              sanctionsScreeningDate: '2026-02-10'
              sourceOfFundsVerified: true
              sourceOfWealthVerified: false
              riskRating: Standard
              notes: Standard KYC checks completed. Electronic verification via Experian.
      responses:
        '200':
          description: Identity verification updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityVerification'
        '201':
          description: Identity verification created successfully
          headers:
            Location:
              description: URI of the created identity verification
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityVerification'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

