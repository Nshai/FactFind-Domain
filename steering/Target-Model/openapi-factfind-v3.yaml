          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenditureCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
