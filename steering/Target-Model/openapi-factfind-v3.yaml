  # ============================================================================
  # Marketing Preferences API (Singleton)
  # ============================================================================
  /factfinds/{id}/clients/{clientId}/marketingpreferences:
    get:
      tags:
        - Marketing Preferences
      summary: Get marketing preferences
      description: |
        Retrieves the marketing consent preferences for a client.

        **Business Rules:**
        - Singleton resource (one record per client)
        - Returns 404 if no marketing preferences exist
        - Contains channel-specific consent flags
        - PECR and GDPR compliant consent tracking

        **PECR Compliance:**
        - Electronic marketing requires explicit opt-in consent
        - Separate consent for email, SMS, phone, post
        - Records when consent was given
        - Records where consent was collected (IP address)
        - Right to withdraw consent at any time

        **GDPR Compliance:**
        - Records lawful basis for processing
        - Tracks consent timestamps
        - Documents consent collection method
        - Supports right to withdraw

        **Use Cases:**
        - Display marketing consent status
        - Check if marketing contact is permitted
        - Evidence regulatory compliance
        - Manage preference center
      operationId: getMarketingPreferences
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketingPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No marketing preferences exist for this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - OAuth2: [factfind]

    put:
      tags:
        - Marketing Preferences
      summary: Create or update marketing preferences
      description: |
        Creates or updates marketing consent preferences for a client.

        **Business Rules:**
        - Singleton resource (one record per client)
        - Creates if doesn't exist, updates if exists
        - Full replacement of resource
        - All consent changes must include timestamp and IP address
        - Consent must be freely given, specific, informed, and unambiguous

        **PECR Compliance:**
        - Explicit opt-in required for electronic marketing
        - Cannot pre-tick consent boxes
        - Must provide clear information about what they're consenting to
        - Must be easy to withdraw consent
        - Must keep records of consent

        **GDPR Compliance:**
        - Consent must be granular (separate for each channel)
        - Must record when and how consent was obtained
        - Must support withdrawal of consent
        - Must maintain audit trail

        **Validation:**
        - If channel consent is true, consentDate must be provided
        - If channel consent is true, consentMethod should be provided
        - consentIPAddress should be recorded for electronic consent

        **Use Cases:**
        - Record initial marketing consent
        - Update consent preferences
        - Record consent withdrawal
        - Update preference center settings
      operationId: createOrUpdateMarketingPreferences
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketingPreferences'
            example:
              consentEmail: true
              consentSMS: false
              consentPhone: true
              consentPost: false
              consentDate: '2026-02-15T10:30:00Z'
              consentMethod: Online preference center
              consentIPAddress: 192.168.1.100
              preferredContactTime: Weekday mornings
              notes: Client prefers email and phone contact during business hours only
      responses:
        '200':
          description: Marketing preferences updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketingPreferences'
        '201':
          description: Marketing preferences created successfully
          headers:
            Location:
              description: URI of the created marketing preferences
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketingPreferences'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2: [factfind]

