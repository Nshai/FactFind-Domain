      summary: List state pensions
      description: |
        Retrieves UK State Pension entitlements.

        **State Pension Systems:**
        - OLD_SYSTEM: Pre-April 2016 (Basic + Additional Pension/SERPS/S2P)
        - NEW_SYSTEM: Post-April 2016 (single-tier flat rate)

        **New State Pension (2024/25):**
        - Full amount: £203.85 per week (£10,600.20 per year)
        - Requires 35 qualifying years for full amount
        - Minimum 10 qualifying years to qualify
        - Triple Lock: increases by highest of earnings, inflation (CPI), or 2.5%

        **State Pension Age:**
        - Currently 66 for both men and women
        - Rising to 67 between 2026-2028
        - Rising to 68 between 2044-2046

        **Additional Considerations:**
        - Contracted-out deductions (if previously opted out)
        - GMP (Guaranteed Minimum Pension) from contracting out
        - Pension Credit eligibility for low-income pensioners
        - Spouse/civil partner inheritance

        **BR19 Forecast:**
        - Official State Pension forecast from DWP
        - Shows current entitlement and projected amount
        - Available from age 50 (or State Pension age minus 30 years)

        **Use Cases:**
        - Display State Pension forecast
        - Calculate retirement income
        - Assess voluntary contribution needs
        - Plan retirement timing
