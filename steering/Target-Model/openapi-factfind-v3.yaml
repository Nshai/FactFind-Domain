      summary: Get tax bands and rates
      description: |
        Retrieves tax bands and rates for specified tax year.

        **UK Tax Bands 2024/25:**

        **Income Tax:**
        - Personal Allowance: £0 - £12,570 @ 0%
        - Basic Rate: £12,571 - £50,270 @ 20%
        - Higher Rate: £50,271 - £125,140 @ 40%
        - Additional Rate: £125,140+ @ 45%

        **Dividend Tax:**
        - Dividend Allowance: £500 @ 0% (2024/25)
        - Basic Rate: 8.75%
        - Higher Rate: 33.75%
        - Additional Rate: 39.35%

        **Savings Tax:**
        - Personal Savings Allowance: £1,000 (basic) / £500 (higher) @ 0%
        - Basic Rate: 20%
        - Higher Rate: 40%
        - Additional Rate: 45%

        **Capital Gains Tax:**
        - Annual Exempt Amount: £3,000 (2024/25)
        - Property: 18% (basic) / 28% (higher)
        - Other assets: 10% (basic) / 20% (higher)

        **National Insurance:**
        - Class 1 Employee: 12% (£12,570-£50,270), 2% above
        - Class 1 Employer: 13.8% above £9,100
        - Class 4 Self-employed: 9% (£12,570-£50,270), 2% above

        Used for tax calculations and projections.
      operationId: getTaxBands
      parameters:
        - $ref: '#/components/parameters/TaxYear'
        - name: country
          in: query
          schema:
            type: string
            pattern: '^[A-Z]{2}$'
          description: Country code (defaults to GB)
        - name: incomeType
          in: query
          schema:
            type: string
            enum: [EMPLOYMENT, DIVIDEND, SAVINGS, CAPITAL_GAINS]
