        Creates a new vulnerability record for a client.

        **Business Rules:**
        - vulnerabilityType is required
        - identifiedDate defaults to current date
        - isActive defaults to true
        - Requires documentation of support actions

        **FCA Consumer Duty:**
        - Must document how vulnerability was identified
        - Must record support actions taken
        - Must note any communication adjustments needed
        - Must track ongoing monitoring requirements

        **Validation:**
        - vulnerabilityType from enum
        - identifiedDate cannot be in future
        - If resolvedDate provided, must be after identifiedDate

        **Use Cases:**
        - Record health-related vulnerability
        - Document life event causing vulnerability
        - Track resilience vulnerability
        - Record capability vulnerability
      operationId: createVulnerability
      parameters:
        - $ref: '#/components/parameters/FactFindId'
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Vulnerability'
            example:
              vulnerabilityType: Health
              description: Recently diagnosed with chronic condition affecting daily activities
              identifiedDate: '2026-02-15'
              isActive: true
              requiresOngoingSupport: true
              supportActions: Additional time for appointments, written confirmation of advice
              communicationAdjustments: Prefer written communication, large print documents
      responses:
        '201':
          description: Vulnerability created successfully
          headers:
            Location:
              description: URI of the created vulnerability
              schema:
                type: string
          content:
            application/json:
              schema:
